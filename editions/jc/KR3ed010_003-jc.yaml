body:
  text: 卷下診胃脈訣云阿阿緩若春楊柳此是脾家居四季此叔和知之而未詳也大抵胃脈雖和緩而貴不疾不速重而取之不虧乏浮而取之阿阿而至不洪不濁即為五臟脈全若弦而急又洪大而有骨力即受肝熱邪能生嘔逆若弦而緊即受肝冷邪能生飧泄訣又曰脾數即吐因脾熱此非脾熱乃肝熱而侵脾故作此和神之方須使去風邪藥以和胃藥此方神效但於使療處方覺其驗訶子皮一兩削術好者二兩藿香藁本陳橘皮芎獨活此止風各半兩根子七銖此用行肝氣乃木香中揀圓小氣烈味苦者細辛防風甘草炙各一分上為末每服三錢水一盞煎取八分去滓和滓任意服餌才服逡巡卻覺胸膈如飢若是肝熱刑脾而吐唇焦口膠面赤渴引飲小便赤背脊寒洒洒如瘧聞暖藥臭只要涼水吃即加荊芥穗二錢羌活半兩連翹一分秦膠三銖干薄荷一分以上同為末每服三錢更入半夏二片水一盞生薑三片同煎至七分服若是脾濕冷泄即加香白芷一分肉豆蔻草豆蔻各半兩如法修制大抵用脾藥須要止風邪藥相併其他加減乃臨時看風氣多少即萬不失一腳膝下邊生瘡乃肺氣不下降使然宜服降肺氣湯藥有病吐半月不已乃心鬲間有涎宜用天南星去涎藥去之水邪攻心氣素問云攻所熱者死用桂與姜壯心氣勝之其病狂言身熱骨節疼痛面赤眼如拔而腦如脫小便白濁而口乾是土氣余而克腎水以枳殼散清其脾則安痔病用荊芥熏以釣腸丸服之方出靈苑者是為醫總論道之渾淪莫知其源道之既判變化無窮莫知其端推其變化之間凝而為質五行名之化而為氣五運統之鍾而為人五臟應之自此而後物之可名數之可推理之可窮而道之跡乃可得而言之也大而天地小而一身理或皆然統而論之要其所養一歸之無失而已故云霧不精則上應白露不下白露不下則苑藁不榮乃至賊風數至暴雨數起天地四時不能相保與此天氣不襲道之相失也人之起居乖宜將養失度一藏有餘一藏不足寒溫之不能相交榮衛之不能相通風之氣乘隙而入疾如飛矢奇病苛疾應如反掌此天地之與人其理未嘗不一矣古之聖人和於陰陽調於四時春夏養陽秋冬養陰與萬物浮沉於生長之門故生身無奇病而壽敝天地無有終時此無他養無失而生氣不竭者也賢人則上配天以養頭下象地以養足中傍人事以養五臟而無失亦可益壽而有極時至於庶人不能法天之紀用地之理失於所養天之邪氣感而害五臟水穀之寒熱感而傷六腑地之濕氣感而害皮肉筋脈百病無端從斯而至病之一生千變萬化莫能窮究故世之善醫者不患治病之難患識病之難患使藥之難何則受病有淺深使藥有重輕度其淺深分毫之不可差明其輕重錙銖之不可偏淺深輕重之間醫者之精粗病者之性命差之毫釐失之千里得失之間死生性命之所繫醫之道不得不為之難也故善為醫者一病之生必先考其根源定其傳受審其刑剋分其冷熱寒溫辨其上下內外有真有邪有虛有實忽隔絕痞塞不通忽空虛微弱失守可針可灸可下可汗闕於不精勇於必驗制之有先後取之有輕重條理具存各有其常而不可差之分毫也夫病之所起其來有根源其次有傳受其傳有刑剋此非常之證勞傷之候也夫勞之為病始於丹元髓海之虛則真病之所生莫不先在於腎水能勝火故傳之於心火能勝金故傳之於肺金能勝木故傳之於肝木能勝土故傳之於脾五臟相傳五氣相滅五神耗散榮泣衛除而精神榮衛治之之法其根在腎而未傳於心者投之以腎邪之藥而其氣自損也當於腎之未治而傳之與心先治於腎攻其鬼而伐其根也次治心逐其邪而保全其心氣也當於心之未治而傳之與肺涕唾膠黏喘嗽不安先治於心攻其鬼而斷其相傳之勢火邪撲滅肺藥未投而喘嗽之消滅十亦去八九矣次治於肺解其邪而保安其金氣也後治於腎清其臟而還其真氣也當此未治而至於肺傳之肝筋骨痿痹隱伏於床治之亦徒勞功如此所為考其根源定其傳受而審其刑剋也夫五臟溫和病安從來將養乖宜病生於變是則百病之起雖千變萬化之幾而要其所歸不出於寒溫熱冷而已冷者不可治之以溫名曰不及涼而治之以熱名曰太過不及者病之不能滅而太過者反有所傷於真氣也冷者熱之寒者溫之輕重得宜疾徐有制動無毫釐之失而所療之病舉獲萬全此所為分其冷熱寒溫者矣傳曰狂風入林枯枝先折猛雨破堙隙者先壞則八邪之所以感傷於人莫非乘隙而入此人之所病不能無內外上下之辨也肺氣喘嗽膠痰堅實伏在胸中潮涎並起傾損性命如此之類病在上也腳膝痿軟行步無力腰胯沉重如此之類病在下也生於皮毛染於筋骨忽寒所中飲食不消忽熱毒所攻大府秘澀百端隨人冷熱如此之類病在內也在上者吐之而安然不可吐者當制之以緩在下者補之而愈然不可補者當制之以急在外者可針可灸可汗隨其所宜而在內者可攻可補可下隨其冷熱而已其治之有方其辨之有法亦何患乎所投之藥無必勝之驗者哉此辨其上下內外者也夫五味爽人之口五色盲人之目嗜欲無窮貪著不已憂患迭生精神㢮壞而真殘根伐是人之不能無虛實也實者為有餘虛者為不足有餘者瀉之不足者補之而補瀉之間又有內外之辨故形不足者溫之以氣精不足者補之以味五臟六腑之內實者通之以藥餌四肢八節之外實者瀉之以針石刺此其補瀉之有所不同也乃所為分其虛實者矣夫古之人年滿百而動作不衰今之人年未滿五十而動作有衰非天之私於古而禍於今也古之人知養道之術嗜欲不能勞其目淫邪不能惑其心血氣安和精神內守故年滿百而動作不衰蓋真全而邪氣不能勝也今之人不知養道之術務快其心逆於生樂血氣枯衰精神耗散乃有胎胎相傳病病相孕受氣虛微肌體羸弱呼吸喘息之間而百病臻湊於五臟六腑者矣此無他精虛神乏而外邪得以干其陰陽之正氣也善為醫者保其真去其邪無使其過劑之藥反有以賊其真也此所謂分其真邪者矣乃至有隔絕痞塞不通空虛微弱失守雖三尺之童亦耳聞而心識者矣夫病之在內藥餌攻之病之在外針石取之其有病勢之急而藥石之功緩而難制聖人不能灸之法類而舉之若今陰毒傷寒其四肢八節皆冷面青唇黑不知人事急於氣海灸之一灸不過十數壯而人神氣完復矣又有夏暑之月任意取涼頻飲涼水忽飲冷酒後恣貪色欲精氣至虛陰邪壯盛陰陽相奪陰氣偏勝獨守下元陽氣虛微上攻頭項其病腳冷如雪四肢八節俱寒脈氣深伏但有其熱如火其痛難忍方此之際針石何濟急於氣海上灸之一灸不過數十壯而日前之所飲涼水冷酒皆轉下須臾四肢八節俱暖而陰陽之氣仍相交際者又有冷熱之癰腫忽鮮赤而疼痛忽堅硬而不痛急以濕紙帖其上尋其紙之先干處便灸一灸至百壯余而後止若以冷腫而紙上不得其先干處即於腫處當頭著灸亦以百壯而止但量肌體厚薄方可安灸瘦薄者少灸肥厚者多灸忽是冷腫灸而不痛則以聞痛而止因吃硫黃後有此病更在虛處不請安灸夫病之可汗可下可針可灸其緩急之序重輕之別操之不失其宜施之各有其度又何患乎人之不安病之不愈者哉嗚呼天地無全功聖人無全能雖黃帝岐伯之論尚有不治之病則今有非常之候不得其詳未明其實闕而勿治醫者不為之辱也苟其病之熾盛人之危篤醫者既明其理又識其詳當此之時不可有分毫之怯急以毒藥驗針回其生於萬死之地舉必萬全然非至神無能與此愚者行之無異於操刀殺人也如此所為闕於不精勇於必驗者矣此皆持之有術治之有統不可相逾於規矩權衡者也至於病之有非五行之所傳化若寒壅之相交陰陽之相伏忽似熱而反寒忽似寒而反熱忽兩寒兩熱之相攻忽有餘不足之相礙千變萬化而生人之大病苦今若肺藏本有實熱反因臨大風冒大雨極感於寒邪之氣寒邪之氣客於肺經寒熱相交發而成嗽醫者治之投以涼藥順其肺氣則助其寒邪之勢而嗽愈增投以暖藥則激其本藏之熱而加喘急寒溫之藥俱難以進則修方使藥之輕重當見於此或有以羌活黃橘皮麻黃去根紫菀杏仁去雙仁皮尖細辛獨活防風桔梗上為末每服二錢沸湯點空心服不過數服而嗽止此輕解其寒邪空心賺其寒邪之氣流出於胃也此所謂治其寒熱相交者矣忽有人之臟腑根本實熱卻因履天暑冒大熱驟入涼處頓飲涼水寒氣勝畏其熱氣陰陽相伏陰氣固而不散陽氣伏而不動其病結為一塊伏在胸中此病名為伏暑者也其候忽寒心中煩躁狀似傷寒而脈不甚數醫者治之妄投轉藥雖六腑之精華悉皆蕩盡而心前之結塊愈增堅固此無他所下之藥助其寒邪之勢陰氣轉堅而不散也治之之法芎藭細辛藿香黃橘皮木香各一分上為末每服二錢水一盞煎至七分為湯空心服之先解其寒邪之氣不移時而心前之結塊頓然消散然後復審其脈氣察其暑毒之輕重必投藥以解之則亦何患乎藥之不驗者哉如此所謂治其陰陽之相伏者矣夫病有似熱而反寒者若今有產後之病五臟積冷陰氣偏勝乳汁倍多無故流出口舌常干非時發渴頭旋目暈飲食減少腸胃虛空身體羸瘦每思登後忽又不通淺學治之不過曰口舌常干非時發渴上焦之有熱也頭旋目暈血熱而生風也每思登後又忽不通者大腸之秘澀也是不知乳汁倍多無故流出則口乾而發熱從可知矣體氣虛弱頭旋目暈腸胃空虛而傳送之氣不足則每思登後又忽不通從可知矣一旦誤以為熱而投之冷藥豈不傾人性命於頃刻哉病有似寒而反熱者若今壯歲之男子志在淫邪恣貪補藥以昏求色欲熱藥所攻榮衛結澀上氣有餘下氣不足上下之氣不相交際腳膝痿弱行步無力兩足多冷或時增寒肌體黑瘦飲食減少才吃鹹味即便噁心醫者治之不過曰此五臟六腑之虛弱也投以暖藥譬猶抱薪救火與甚亡益也才以清涼之藥解利肺經散其毒熱上攻之氣榮衛一通則其陰陽之氣仍相交際手足自暖腳膝損輕而平復如故矣此所謂似寒而反熱也夫歲陽太過天地不無旱乾之災歲陰太過天地不無水潦之患以虛生寒以實生熱則人之臟腑不能無兩寒兩熱之相攻也若今傷寒所謂陽毒之類皆兩寒兩熱之相攻者矣哀哉色欲無厭喪身之本世人多以迷心恣其所欲反餐毒熱之藥以希苟活其丹元髓海雖已空虛而臟腑骨槽虛熱轉盛此病之所生不能無有餘不足之相礙也若今人之患大腸秘澀忽五六日忽十日出後不通小腸虛憊日夜五六十次每次小便仍有一盞半盞已來其清如水忽時黃色臨小便時其痛難忍甚則心神煩躁此肝心脾肺四臟之毒熱有餘而腎與小腸主氣不足也脾肺心積熱則腸乾澀腎與小腸虛憊則水道滑肝心積熱則其血沸溢甚則血黯黑熱毒之氣如煙如霧鎮在中焦因其小腸虛憊水道乘虛只行於小腸此所以小便雖清其痛難忍其病有似於淋而非淋疾天下物理有似是而非者正謂此也醫者治之投暖藥以固小腸而則滋其肝心熱毒之氣而痛愈加下涼藥通大府則藥隨水道只行於小腸而病愈盛冷熱之藥俱難以進此有餘不足之相礙也治之之法當以通氣藥為湯洗其穀道先引其五臟之氣歸入於胃使其湯水稍隨氣而下入於胃第二度使水漸取得一兩個下氣相次如藥取得些小干糞氣歸大腸所餘湯水亦隨氣行歸入大腸則未吃小腸氣藥而小便自止也漸次使藥通其肝心熱毒之氣使出後稍通便下藥取其熱毒所取下物如半腐爛者淤血之類如此然後得其病根之消減也所下之藥具在方中此謂治其不足有餘之相礙也籲醫術如林余之所得芽孽而已醫道如海余之所得涓滴而已因其所得雖無寸長稽其用心實非古人之形於筆舌者今略舉數條論之於前以明醫道之大略而已涎論論曰舟非水不行然波濤沸溢則覆舟之患生人非氣不活然痰涎並積則傾人之患至波濤非自生也其所以生者不平之勢作之也痰涎非自積也其所以積者不順之氣留之也故善行舟者不懼波濤而懼舟之不完善攝生者不懼痰涎而懼氣之不順故世人之疾病其所以殘傷性命之急者無甚於痰涎而世之醫者乃有見之而不能識忽有識之而不能治此不幸之人其殘傷夭橫者不可勝數何則舉天下之人獨知風氣之有涎不知臟腑冷亦生涎熱亦生涎痰涎一生千變萬化而病之所起非特一端愚今略舉數端明之後之學者於診療之際類而推之亦庶幾其疾病之徒無夭橫者矣夫涎之為名一也而具數種一曰風涎二曰熱涎三曰冷涎四曰病涎五曰虛涎六曰毒涎其一曰風涎蓋因人之風氣之盛上運於涎不能下入於胃風氣一蒸痰涎並起而上填塞胸中即使人悶倒無知其風氣久而不順性命之傾危速如反掌若其風氣未盛逡巡之間仍復自順其涎亦隨氣而下即平復如故此蓋人之肌肉厚湊里深風不得泄於外風熱內攻大府秘熱毒氣上攻遂生斯疾此名之曰風涎然風涎之為名一也而人臟腑虛實之不同則涎之為病也變化不一愚得以命其變而言之若今人之病大府實熱痰涎滿口吐如清膠胸中喘息如常但湯水飲食俱不可進凡所飲食只到喉中即不能下用力嚥下即喉中隔絕喘急悶倒良久方愈惟進得些小膠粥此亦風涎之候也然風涎之候變不同則當如何而治之曰善除荊棘者先斷其根善治風痰者先順其氣人身無倒上之涎天下無逆流之水今風痰一上而填塞胸中傾人性命者風氣運而上也今之治風涎者多使天南星半夏之類是不知病之源流去荊棘而不除其根也苟能以藥先順其風氣兼發其湊理使其風氣得以發泄於外順行於內則其胸中之痰涎自隨氣而下未吃涎藥而痰涎自順矣然病勢之有輕重則取之有緩急若風氣炎盛膠涎並起其氣卒難以順之者當制之以急非吐之不可風氣未極痰涎未並為害未深者當制之以緩先順其氣而後治其涎也此亦治涎之大約也然風涎之候又有冷熱之不同或有寒風所中冷涎所聚其人必先於半年或數月前吃食減少身體沉重筋脈痿弱才見肉味便覺噁心非時口中一兩點冷涎出身不自覺冷涎所並忽悶倒不知人事良久復甦即生麻痹或生嚲曳或失音不語冷涎所積少有上並多聚中焦盈溢胸中包裹心絡能使人狂言妄語神識不定非特不覺手臂忽自舉動如此為冷涎之所中也治之法先以溫暖之藥散其冷毒之氣急以熱藥發其腠理然後以治涎之藥取下其涎雖且暫安而寒風所中於人亦甚不久何則熱風中人如天地春夏之風長含生氣以養萬物其人雖病難死此古人所謂風所以能養人也寒風所中於人如天地秋冬之風長含殺氣以肅殺萬物其人所中非久必死此古人所謂風所以能害人也其二曰熱涎若今有取性之丈夫多餐葷膩好食鹹酸以色為心恣貪補藥忽因醉酒房室勞傷其精丹元髓海雖以空虛而臟腑骨䐬虛熱轉盛其涎所積隔在中焦因其腎臟之虛寒邪氣與熱涎相交發為疼痛重則不移時而傾人性命醫者治之不過曰此肝腎之氣是不知熱涎乃病之根本然京三稜蓬莪朮非能治氣而世人用而不驗者不識其病之源流也善為醫者臨事制宜隨機應變審當輕重涎多者吐之涎少者下之所用之藥偏取肝家之風毒又何患乎人之不安哉三曰冷涎者若今人之肝臟有餘脾氣不足忽因使性長懷淤怒傷損肝心正氣此冷涎之所以積也脾氣不足復因肝氣所乘伏而不動停水滯谷久而不化肝心長懷淤怒則其氣滯澀而不行此冷涎之所以積也然肝生風性之不定忽時而作肝主怒怒則氣逆此冷涎所以隨氣而上而生人之大病也證其候而言之則其病必先聞心前潰亂不快相次聞有一物隨氣而上觸至咽喉即悶倒不知人事手足肌肉漸次寒冷逡巡復平愈治之之法當以吐藥取之得其所取之涎其清如水其冷如雪取涎之後復審其臟氣隨其所病而調和之亦無患乎藥之不驗也四曰病涎其人必好食堅硬之物傷損脾氣忽因淤怒傷損心肝正氣忽因寒邪熱毒之傷忽因大病之後餘毒客在臟腑其氣結澀昏滯不能宣暢是以痰涎因而聚積涎與滯氣相交往往發為疼痛此名之為病涎者也明其病證在心前痛輕則連年累月痛無暫停重則傾人性命速如反掌重輕之殊涎之多少也治之之法當在量其病勢輕重以利藥取之輕則其涎如油重則其凝如白膠取涎之後然後使藥清其藏氣益其正氣使之平復如故也五曰虛涎其人必因受氣之虛忽因大病之後生冷所傷忽因疾病之間淫欲不節致令臟腑之氣空虛羸乏而骨䐬之間虛熱上蒸上氣鎮長有餘下氣但常不足陰陽之氣不相交際不順之氣隔在中焦是以虛涎因而積聚風熱一攻即其涎並上初發作時先覺清涎滿口漸聞心前有一物上觸咽喉即喉中急促悶倒不覺兩手相亂把拽風氣極上即頭上癢忽皮臍間痛逡巡風氣順下乃遂平復治之之法當以臨發時使五分利藥取之以其胃氣不足不可十分利吐也若利吐不出非時以壞風涎藥攪之候分數少減即於氣海上安之一灸引其涎下入於胃然後使藥調其臟氣酌量其臟腑之虛實有餘者瀉不足者補令上下之氣相等可庶幾其全安也若脈氣微細大府虛冷減其肝氣益其胃氣斯可矣若小兒得病者全是胃氣之虛氣海上安灸補暖脾胃以愈斯痰仍不輒吃取風涎藥也六曰毒涎若今人之患陽毒傷寒肝心脾肺受其疫毒之氣因其毒涎相積聚在中候其證即使人大府秘熱小便黃澀面色黯赤渾身發熱昏昏如醉狂言妄語不知人事如此之候悉皆是涎診其脈氣又卻沉伏重手取之骨間乃得此乃疫毒之涎盈溢心胸伏其脈氣非脈氣之與病相反者也此所謂毒涎者矣治之之法急以疏轉之藥取其毒氣蕩下其涎所下之藥須心肝脾肺四臟俱治然當以肝臟為主偏下肝臟之藥為要也雖然涎之為病千變萬化其狀不一是今之所舉數端止其大略而已後之學者類而推之加以識見之明而診療無差亦無患乎涎為人之大患者矣治涎諸方凡人得只有此方內一件一句病證皆可吃此藥治一切丈夫婦人風涎所積非時急飢見食即飽心中嘔逆一切飲食都不聞味口中涎溢唾如濃膠急即吐逆食不住腹面色青黑肌肉乾燥唇皮焦赤忽時黑色兩脅下氣跳忽沖脅下跳戰轉入背脾痛遍身肌肉忽時跳戰兩臂沉重忽如有物壓著夜間都睡不著忽如有物上觸咽喉即昏悶不醒須臾仍卻無事忽時如有物纏繫腰背忽時有物橫在背上腰背疼痛忽滿口生瘡忽時下赤糞忽時泄瀉不定頂上躁熱小便赤色通身發熱眼色勁急忽時心躁熱上攻胸額髮汗如水忽時項上皮肉間疼痛不可忍忽時心前脅下迸重如懸一片物忽聞重處非時麻痹忽身上肌肉結塊連綴疼痛不安忽時頭面小腹兩腳都腫若是婦人連陰門腫忽起兩眼迸痛視物不明若有此候月水不行通得月水方為安校忽時聞在兩脅下起衝入胃管上築咽喉昏悶不安須是開口仰項吐氣方得稍快忽時如有亂蟲咬心肝不可眠臥忽時聞氣在手指足指甲起相次聚入胃管即便大發熱昏絕不醒人事須吐氣千百聲良久方蘇如此是臟腑有積毒風涎之所致也凡人不安有此內一件病證皆可進服此藥但論輕重加減服餌吃此藥後四肢八節肌肉毛髮俱軋軋然有聲即藥之驗也此涼藥也吃後大府反熱即取病之證也此病有根受之太深此藥不輟進服徐徐減病根若病勢濃者急灸肝俞減其風氣若是大府結澀更添下面藥數味吃安校若是太歲過六壬丁卯己亥之年常有此候己巳己亥年其病尤甚若遇己上年辰雖無病之人亦可吃此藥免得生病治風氣取涎方荊芥穗麻黃去根薄荷羌活連翹防風獨活芍藥木香乾蠍殭蠶去絲各三分牽牛半兩半夏三銖山梔一分以上細搗為末每服二錢食後煎生薑薄荷湯調下和滓服若是大府秘熱膠痰滿口喉中咽藥不快只請去滓吃候風氣少利即和滓吃也若是大府秘不出後即用大黃一分半夏三銖牽牛一兩半共三味搗羅為末作一處每服用上面藥末三錢牽牛等末三錢共計六錢滴熟水丸如梧子大為一服巳午時蔥湯下大府尚不通忽穀道中通糞不下即用皂角牽牛二味搗羅為細末筆管盛納於穀道中吹之剪去指甲用指頭穀道中撥取干糞下也痢論夫痢之為病世人所患者多然方冊所載者未嘗有必驗之方古人所談者未嘗有卓然之論服餌之間世人夭橫者莫知其數此聖人名方為大奇後之學者不能思而自得之也若今有人得一名方自以為神傳聖惠應效不測然有一人服之而減未可圖其必然之驗也此愚以方冊所載者未嘗有必驗之方也以赤為熱以白為冷醫者之辭萬口一說此愚以為古人所談未嘗有卓然之論也何則以赤為熱以白為冷赤白為冷熱不和獨知大綱而痢之有變化重輕之別得其粗而不得其詳知其一不知其二者矣夫痢之為痢一名而具八種一曰白痢二曰赤痢三曰赤白痢四曰水穀痢五曰血痢六曰疫毒痢七曰休息痢八曰小兒疳痢此皆受之不同治之不得不異索其詳而論之則其痢之為病雖變化重輕之不同然一歸之脾氣之虛而已萬物非土不生五行非土不載五臟非脾不養脾者中州之土能化腐水穀設滋味於肌膚行糟粕於大腸脾臟溫和而諸臟之有冷熱不調即自生他病不為之痢也是故赤痢雖熱本因脾腎之虛赤白相雜雖為冷熱不和而又有重輕之別若今人之下赤痢先轉數行而後有赤痢之變若以赤痢為熱何乃有先轉之說歟以赤白為冷熱不和而復有赤少白多赤多白少能無重輕之別乎此病有變化之不同予得以命其祖而言之也一曰白痢者五臟傷冷脾胃極虛之所成也其得之重出後如雞卵清如魚腦漿者腎有所傷也急以補脾腎藥以暖之加以舶上硫黃丸無問多少空心即服以止為度蓋病勢之重治之不可後時也二曰赤痢者三焦之熱血有餘而脾腎感寒之所成也夫肝心積熱之人多食生冷愛吃涼水口之所納都聚於脾腎寒溫之氣所傷而肝心氣變血損於中此肝心之血乘脾之虛滲入大腸而赤痢者也先服解寒氣藥次吃暖脾藥其治之如反掌爾三曰赤白痢者心肝血損而脾之與胃臟腑皆虛之所成也脾氣之虛則肝氣相乘胃氣之虛則停水滯谷凝而為涕肝氣乘脾氣則肝心之熱血乘脾之虛滲入於大腸與胃中之涕相雜而下此所以為赤白也忽有赤少而白多忽有赤多而白少忽有赤白相等此受病有淺深下藥有輕重當在臨時度宜隨機應變不可差之分毫也愚初以謂赤多而白少者清利肝氣而輕暖脾胃也白多而赤少者微清肝心之氣而甚暖脾胃也赤白相等者微利肝心平益脾胃氣而自愈但發寒熱為最重方見痢方中四曰水穀痢其人多飲涼水忽餐生冷之所成也所下之痢悉皆黃色忽時下白沫治之之法補暖脾胃而其疾自愈五曰血痢其人多淤怒因更相毆擊忽因焦熱極驟食生冷脾胃損虛之成也所下之痢多黯赤色無寒熱者清其肝心之氣而疾自去矣六曰疫毒痢者毒氣所傳一坊一境家家戶戶更相染易無有不病凡下痢之時忽先發寒熱忽先轉數行忽生冷所傷因而下痢所下之利渾是赤色濃如膿涕忽時半盞下濃血腹中刺痛忽心中煩躁三焦痞隔全不思食此名為疫毒痢也然則疫毒所主五臟從何而得經言春若傷陽夏必人多瀉痢此疫毒之根先受之於肝也夫春氣本和而反傷於熱此陽氣所勝肝家受熱而其氣有餘者也經言五行受病必先傳其所勝則肝之得病必先傳之與脾而世人於夏月之間多食生冷傷損脾氣脾氣虛肝邪得以乘之而脾受肝邪伏而不動莫能消水化谷此疫毒之痢必先轉數行而後有赤痢之變也先轉數行者脾受邪而脾已生病也後有赤痢之變者肝之血熱乘脾之虛滲入大腸而為赤痢也中間忽有赤白相等者此肝之毒血雜胃中之寒涕也若發寒熱方見痢方中有白少而赤多或有白多而赤少肝之邪毒有輕重之不等也七曰休息痢者蓋患痢之人其治痢之時不能解肝邪而肝家餘毒之所成也脾臟久受肝邪則不能強健消化水穀是毒痢之所下纏綿久遠而不較此所以為休息也八曰小兒痢者蓋小兒肝受熱而相刑于脾之所成也肝之刑脾則所下之痢全是赤色或赤白相雜至脾之自受疳氣則骨肉消瘦所下之痢多黃涕白沫少有赤色相雜也如此數端亦治痢之大略而已至於醫道之淵微愚不能知其妙治痢諸方治脾胃虛冷停水滯氣凝而成涕所下之痢渾是白涕宜吃此方初得痢時並無壯熱頭痛方可吃此藥舶上硫黃一兩細研如塵上以白麵一分鍋內炒令熟放冷於乳缽內與舶上硫黃末同研令勻滴熟湯丸如梧桐子大每服五十丸以止為度空心溫米湯下若初得痢時即不可吃此藥治脾胃氣冷相刑于腎土水相攻寒濕交爭所下之痢全是清涎有如雞卵清之類宜吃此方將舶上丸相間服石斛去根白朮吳茱萸續斷草豆蔻去皮芎乾薑蓯蓉一分防風各一分訶黎勒逐個麵裹火炮熱去核只使皮秤半兩牡蠣一分火煨通赤以上細搗羅為末煉蜜丸如梧子大早朝空心溫米湯下五十丸空心服有壯熱不請吃治三焦壅熱其血流散乘脾之虛滲入大腸而所下之痢盡皆赤色別無白痢相雜並不壯熱亦無心腹疼痛診其脈上都洪大脾脈外鼓而沉大宜服此方候上焦氣清赤痢消減忽變成白忽赤痢減後卻聞得小腹迸脹即便修合後方吃取平安麻黃去根防風麥門冬去心獨活木香牡丹皮去心前胡去毛荊芥穗各一分蒲黃四銖上為細末每服二錢食後熟湯調下去滓服候赤稍減忽變成白忽聞小腹膨脹即修合後方吃也治赤痢吃前方了忽變成白忽已校可忽聞小腹膨脹宜吃此方防風甘草炙各一分芎半兩木香三銖訶黎勒麵裹火炮熟去核只使皮半兩上為細末每服一錢半水一盞煎取九分空心和滓吃治水穀痢所下痢並無赤色只下黃涕忽時下白沫飲食減少肌體黃瘦宜服此方訶子麵裹火炮熟去核只使皮一兩黃橘皮白朮芎各半兩甘草四錢肉豆蔻一個舶上硫黃一兩細研上搗羅為細末用舶上硫黃相和令勻用薏苡仁作粉煮粥丸如梧桐子大急火焙乾每服五十丸空心溫米湯下須是焙乾莫令損藥氣治赤痢所下之痢渾是鮮血忽有黯色據候多因使性瘀怒傷損肝心正氣忽因事爭打傷損經絡致有斯疾桑寄生一兩獨活木香甘草炙芎牡丹皮去心各一分上為細末水一盞煎取八分非時吃每服二錢治疫毒痢並論痢藥鬚子細對證用之取效如神大抵此一集方無不精妙但要病藥相對凡疫毒痢一方一境家家戶戶更相染易無不病緣疫毒之痢非獨一般證候多端根源奇異雖神農岐伯尚以為大奇之病後之學醫未識其粗跡豈知其津涯但言白痢為冷赤痢為熱赤白為冷熱不和不知有何經證以白為冷偏下暖藥幸亦無差以赤為熱不知熱從何藏愚者妄言不過曰熱從肝心因何無涼肝心必驗之一方定治赤痢以行於世以赤白為冷熱不和又不知指稱何藏愚者妄言不過曰冷熱氣不和復不知因何無和氣藥一方定可用治赤白痢以存之方冊醫家自不知病在五臟從何而生只務檢方行藥幸而偶有所中入且獲安不幸而差之毫釐所投之藥乃暗中與戰但病者不見痕跡所傷無能知覺觀之得不寒心籲神農之後世世學醫者未明天地之氣候不識五臟之應變者不能知常病之源流豈足與語奇病之變化是以痢之一病方冊所載古人所談未嘗有一言一句略明其粗予嘗探尋五運之氣數稽諸天地之變化推步六氣之行度參考脈氣之纏注以天驗人以人應天痢之一病億萬分中少知其一二但以其變化之間獨可神悟難以言窮筆舌之間不能曲伸其旨使後學者洞識精微而無悟人之性命深以為恨今但子細陳其粗跡以為後之醫者筌蹄在詳審而用之適足以知我之用心誠為愛人之切爾經言春若傷陽夏必久多瀉痢此之一節無問太歲但一春之間早有炎暑暄熱之化至於夏月忽生瀉痢之病通其肝氣其病即愈但兩三盞無驗更不請吃若少有效驗吃之以較為期蓋痢之一病證候多端藥中其源即便安校故無在於多吃也切慮世醫誤認證候妄投藥餌以傷性命但患痢之人所吃之藥兩三盞不見效驗更不請進服今自有方具其變之候備別於下更在詳擇而用之永無差誤緣疫痢之狀變證多端予請以太歲推之子午之年君火司天土性生金火性制金土火交生濕蒸相搏則宜其土有所潤火有所溽火氣見郁心氣內傷乃生赤白血痢寅申之年相火司天土火併化氣味交通與此同候丑未之年太陰司天土化流行土火交通濕熱並至子母同化性不相侔溫濕攻心脾郁心氣內變血淤於中注下赤白且子午年丑未年寅申年土之司天則異而氣化之生病則同何也答曰夏秋相交火金相繼土之一氣常遊於其間土有所潤暑有所溽然後金生是以火土二位氣位交通事理相混其所以司天之歲雖殊相鬱而生痢則一也方見下卯酉之年陽明司天金行其令氣化悽清人少脾病六月七月水火相犯八月九月金木相攻水之與木一化有餘赤白下注從此而生是歲君火司地少陰在泉火能制金一旦於歲中火淫所勝焰明郊野則化來救寒更作人病赤白在下己亥之年少陽在泉相火司地與此同化然君火之化善相火之化惡善則傷人遲惡則傷人速治同法方並見下辰戌之年太陽司天水化流行寒邪犯心血氣內變傷損於中因而下注赤白此病世之罕有蓋傷犯人之急也但辰戌年之痢發熱如火當痛所下之痢如紫草水如膠涎如茶腳不急治之其亡也如反掌方並見下己亥之年厥陰司天木化流行土木相交風濕相爭脾土受邪此肝之熱血乘脾之困滲入大腸而生赤白瀉痢之病方見下以上天地氣候推之未詳予請以五運之政推之甲子甲午濕化有餘丙子丙午寒運太過庚子庚午上受天刑必有水救以上年辰天地相過剛柔始交月氣是水與天相犯水火相持以為一年病始更遇寒濕之運與水相助忽受刑之運有水相救以上年辰歲半之前多有清肅之化至於夏月氣候反寒熱交爭乃生赤白之痢為此寒濕犯火德之與常例不同自有方在下子年為甚而午年少減若寒化偏多陽化少舉乃生寒瘧傷寒麩瘡之病痢疾乃加戊子年上為天符戊午年天符歲會氣以之詳人以之寧一旦寒濕之氣少犯於心忽注下赤白人多患暴死有此證候治之亦與丙申年同議者謂戊子戊午年天氣運氣皆是火今乃言忽有寒濕犯心何也答曰己午之上有戊己之土當有寒濕之化與火相持然後使金得而生此戊辰戊午年亦疑有寒濕之化相犯於心也經言中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死蓋以此也壬子壬午木運相助風熱大盛木能制土脾乃受邪若此歲中忽有大風炎熱之勝人生瀉痢之病其鬼在肝方具於下然子午之歲地之初歲寒邪與天相爭丙丁之位與戊己共居若於歲中反有寒濕之多所生之痢治亦與甲子丙午甲寅甲申丙寅丙申戊申庚寅庚申壬寅壬申年氣候大約與子午年同所生之痢亦同法方並見下乙丑乙未丁丑丁未己丑己未辛丑辛未癸丑癸未以上年辰每一年之運各管三氣化乙丑乙未金運本涼以其氣之不足反與少徵同化然火土交味太陰所寓熱化並行濕熱相持心氣內郁血損於中注下赤白忽火之不常其德侵傷其不足之金則水必相救寒邪犯心因而生痢此乙丑乙未年之痢忽有以土之鬱火而生忽有水之犯心而成其受病臟腑雖不同然土水共胞寒濕同化則其治大同而小異也方並見下經言其運涼熱寒蓋以此矣向下准此而推丁丑丁未木運正風與天土相犯然以氣之不足反與少商同化若於歲內金之不常其德多有清肅之化則火必相救炎暑將至與土相持而濕熱相交血氣內損乃注下赤白然丑未之年天能制色土將犯水木雖不足而其怒無時忽若風化大來土木相戰則肝發傷脾此丁丑丁未年之痢忽起於肝忽生於脾者矣方見下經言丁丑未之年其運風涼熱蓋以此也己丑己未年天符歲會氣以之詳物以之寧人以之安然太陰之味先苦後甘氣化相交土性生金火性剋金忽於歲中火土相攻心血內變痢疾所生人多暴死此蓋邪之不可侵傷於貴人也方見下遇此年辰常吃調和脾氣藥以安貴人是服食之宜也辛丑辛未水運不足雖上受天刑然下加太陽反歸乎氣是歲天土地水寒濕偏多火氣見郁若有痢之疾生其起在心其鬼在於脾腎方並見下癸丑癸未火當其運其氣不足反與少羽同化是歲太陽在泉寒氣不減寒濕更作火氣見傷痢之所生其病在心其鬼在脾腎胃方並見下寅申之年大約與子午年同但相火之政暴遇其獨勝則其害立至若與水土相犯其候變證多端方具於下乙卯乙酉年金運不足本與少徵同然乙在卯上為天符反歸平氣在酉上為三合名曰貴人邪不可犯然是歲金位在上火位在下名為逆化金燥交合切忌火氣之勝若火有所勝水必來救此年忽有痢疾之生天氣炎熱病起於心氣候清寒病起於腎方具於下丁卯之年木運不足下加於卯雖上受天刑其政不減是為歲中忽有風熱之勝痢疾之生其鬼在肝乙酉之年木受天刑然是歲火司於地與木相得忽於歲中反有風熱之作方見下己卯己酉年土運不足然木受天刑必難相犯忽於歲中風濕交爭痢之所作其鬼在脾卯年宜有此候酉年差減若有此疾治之亦同辛卯辛酉年水運不足反與土同化而歲水不及火化妄行與土相持勝熱客於胃多下赤痢忽作便血土勝則溽火而注下赤白是歲若有痢疾之生一起於心一起於脾有方治之具見於下甲辰甲戌丙辰丙戌之年寒濕過多火氣見溽庚運之年清化亦甚是歲運氣與天水相生與地土相得以上年辰痢疾之生切為大害不可妄投涼藥戊辰戊戌之年水火相戰壬辰壬戌之年土木相攻所生之痢其證自各不同方具於下乙巳乙亥之年金運不足無能與天相犯乃與少徵同化丁巳丁亥之年上為天符木化之甚己巳己亥之年木能制土脾將受邪辛巳辛亥之年水運不足與土化同土木相攻脾氣偏弱癸巳癸亥不足之火與天相得與地相符火致政不減是痢疾所生起在肝心方並見下以運言之猶且未足予請以六氣推之子午年丑未年寅申年四月五月火土相交辰戌年四月五月水火相犯己亥年四月五月木土相攻卯酉年四月五月金火相持水若相救邪乃犯心子午年六月七月土火相郁卯酉年六月七月水火相犯辰戌年六月七月土木相攻己亥年六月七月火土相持以上年月忽生痢疾皆隨其月氣相攻而成也善為醫者先治其鬼其病自愈議者謂六氣推遷於十二月中各紀一步今獨舉四月五月六月七月兩氣以言痢疾何也答曰夏秋相交火金相繼土水二化長遊行於其間土寄於巳所以生金火位於申所以制金土生於申所以傳金水生於申所以救金然後夏秋有相承之理五行六氣玄妙從此而著人之痢疾從此五行玄妙中生是故聖人名之曰大奇之病予故陳逐年四月五月六月七月之氣候以言之其餘他氣生痢皆仿此而推切以六氣之政化見之未詳予請以脈候明之若今人之下痢服涼藥暖藥皆不驗診其脈脾一指外鼓而沉此名腸澼其候非藥力可治久當自較但世人有患不驗纏綿經久卻因亂吃一般物便得安校此乃正腸澼之候也今有患痢診其脈肝脈一指小而緩此病輕治即愈今有人患痢診其脈腎脈一指小而沉所下之痢皆是血痢此之一病受之非常治之亦難血溫身熱者死方亦見下今有人患痢診其脈肝心脈脾脈皆微細不澀不絕所下皆是血痢藥到便安今有人患痢其脈微小再三尋之又沉而澀此之一候若下白痢其勢雖重庶幾可治若是下血切忌發熱通身發熱者死熱見七日死以上所陳雖未足以達痢之淵源亦足以明其粗跡議者謂如子所言自甲子至於癸亥每六十年中未嘗有一年不生痢疾今世人患痢疾於數年中間忽止有一年其故何也答曰六十年中未嘗有一年無水土相攻未嘗無土火相郁未嘗無水火相犯但五運之政譬如權衡一年間五行氣數更相承製得其平等則其疾自然不作忽若一氣大過一藏有餘痢疾之生應不旋踵予故備陳其粗以開後學之未悟庶幾診療之間無差悟之過者矣但毒痢傷人不一惟水邪犯心為重世人初患痢時先發寒熱投藥治之其勢不退發熱太甚食則嘔逆下痢不止心熱如火只要入涼處只思吃冷水狂走渾身肌肉疼痛著手不得此候十難治其三四也治疫痢方須是子細首尾讀此方論令分明識病根源然後吃藥但毒痢初得時先發寒熱忽頭痛忽壯熱忽轉數行便下赤白相雜忽止下白痢忽先下白痢後變成赤痢忽先下赤痢後卻變成白痢宜吃此方但初下痢時先發寒熱頭痛即是寒邪犯心寒氣犯心水火相戰故初得病先發寒熱水火相犯血變於中所以多下赤痢如紫草水如莧菜水無色澤者寒邪犯心之重也先發寒熱而所下之痢止白色者寒邪犯心之未重也先下白痢而後有赤痢之變者寒邪犯心其勢漸加也先下赤痢而後變成白痢者寒邪犯心其勢漸減也赤白相等者水火相犯其氣相等寒濕之氣相搏而成也忽有赤少而白少此寒邪之勢有多少毒痢之病有輕重以白多為輕以赤多為重治之之法先奪其寒則所下之藥一也以太歲分之則丙子丙午甲子甲午庚子庚午丙寅丙申年甲寅甲申年庚寅庚申並辰戌之年運過丙申及庚運所臨其害尤甚及丑未之年宜有此候又更無問太歲蓋天地變化其候多端難可窮盡今立此方但世人亦不必椿定太歲但看一年中春夏之內多有寒肅之化陽光少見忽寒熱二氣更相交爭忽於夏月多寒濕之化寒邪犯心所受之痢先發寒熱忽頭痛忽先轉數行後有赤痢忽赤白相雜忽止下白痢並宜吃此通神散吃後取壯熱減退若兩三盞後壯熱不退更不吃此方自別有論方在下麻黃去根節官桂去粗皮各三分甘草各一分炙大芎白朮各一兩細辛八銖獨活桔梗防風芍藥白芷各半兩牡丹皮去心牽牛四銖炒上為細末每服二錢非時熱湯調下和滓熱吃若吃三兩盞後寒熱不退更勿吃自別有方論在下若吃此藥後寒熱已退赤痢已消減便修合第二第三方藥吃之取安校若寒熱已退赤痢未消減更服三兩盞然不可多吃一日只兩盞候赤痢消減忽變成白痢漸次修合第二方吃候出後度數減少便修合第三方吃取平安也但六甲之年六庚之歲春夏之內時氣多寒人得痢疾此藥通神若是六甲之年丑未之歲濕化偏多人得痢疾先發寒熱即於方內添草豆蔻一兩修合也又不問太歲但一年間春夏之內多寒人有痢疾先發寒熱並宜吃此方治毒痢初得時先發寒熱吃前方寒熱已退赤痢已消減宜進此方還真散若吃前方藥寒熱未退赤痢未消減更勿進此藥但天地變化其候非常痢疾證候多端此不得不盡子細故爾訶子五個用麵裹火炮熟不要生不要焦得所去面不使就熱咬訶子破去核不用只使皮焙乾上細搗羅為末每服二錢以米湯一盞半同藥煉取一盞吃若吐出一兩口涎便住如此吃經數盞大府漸安出後減少便修合第三方藥吃以牢固大腸若吃前方藥壯熱未退血痢未減不請進此藥治疫毒痢吃前兩方藥病勢已減所下之痢止余些小忽青糞忽如鴨糞忽如茶湯如濁油忽只餘些小淺深紅色宜吃此方以牢固大腸還復真氣舶上硫黃丸舶上硫黃一兩去沙石細研如飛塵上以薏苡仁二兩炒熟搗為末與舶上硫黃相和勻滴水相和丸如梧子大空心以米湯下五十丸治毒痢初得時先發寒熱服前面毒痢方通神散三兩盞一日忽隔一夜寒熱不退下痢不減分數通身發熱所下之痢多是濃涕如桃花色如紅米膠每一次忽下一盞半盞已來吃此藥二盞三盞經一日忽一夜寒熱不退下痢不減分數更不進此藥若依法進藥兩盞壯熱便退下痢少減分數即請漸漸進此藥每日只兩盞候赤痢稍減忽變成白痢卻修合上面還真散吃取平安且痢之有寒熱其證一也前方以暖藥解之此方以涼藥投之其說何也答曰水邪犯心身能發熱土濕鬱火身亦發熱肝熱刑脾身亦發熱惟至精者識其秋毫之變切恐世人未能通其妙旨予因設此兩方以救其失然毒痢之傷人惟水邪犯心最為極重但患痢疾之人有增寒壯熱先吃上面通神散兩三服寒熱不退下痢不止然後進此藥以太歲分之惟六壬六戊寅申巳亥之年宜有此候而六戊之年尚有差變蓋火盛之年必有寒濕相犯故然以六氣推遷不定又不可局定年辰但一年之間春夏之內熱氣偏多濕化不舉人有痢疾肝脈弦心脈洪然後吃此藥若吃兩盞後不見效驗更勿進服蓋痢之所起切忌水之犯心不可妄投涼藥故此方兩盞後無驗更不可服荊芥穗牡丹皮去心木香白頭翁芍藥桔梗防風獨活地榆各一分黃連蜜浸一宿火上炙乾使三分牽牛炒一分上為細末每服二錢水一盞煎一二沸急瀉出食後溫和吃之此藥少見效驗更可進服以安為期然不可多吃一日只兩盞痢才住便得止治毒痢初得時發寒熱微有小寒熱忽止腹痛出後時糞後有少膠涎與赤痢相雜卻自誤吃涼藥漸漸下痢極多從早至暮但只思睡早朝即顏色枯瘁身體稍涼近晚至夜即面色赤顏色光潤下痢極多皆是清涎與赤痢相雜通身發熱不思飲食渾身肌肉著床則痛據此候宜當吃此藥但身體大熱如火與人相近則熱氣逼人其脈輕微輕手取之散滿指下不分部位全無骨力指下如風如氣重手取之指下全無急用訶子五個炮製如下面法掏羅為末為一服先用熱米湯調和滓熱服吐出涎脈氣方生可進下面方白朮半兩白芷芍藥大芎各一分甘草四銖炙訶子五個麵裹炮熟去面咬碎去核用肉焙乾上細搗羅為末每服三錢熱陳米湯調下和滓吃治毒痢初得病時並無寒熱所下之痢全是濃血忽黯血左右三部脈氣皆微細宜吃此方桑寄生一兩防風芎藭各一分甘草四銖炙上搗羅為細末每服二錢水一盞煎八分空心和滓吃治赤白痢初得時並無寒熱忽患赤白痢經久未較別無增寒壯熱宜此方淡豉十個黃連四十九枚每枚長一粒飯許上件用新垍瓶一個安藥在內以新片瓦蓋瓶口大火煅通赤後煙絕取出就熱研如飛塵每服二錢熱鹽米湯調下和滓服應是赤白痢無問赤多白少但身體無增寒壯熱者皆可吃此方治赤痢或赤白相雜初得時並無增寒壯熱經及數日身體不熱只聞小腹內躁熱下血不止或止血便暖藥不見驗效宜服此方寅申己亥年六壬之年宜有此候但吃兩盞後不見效更不請吃此藥但唇皮赤忽腫黯色小便黃白身體涼夜間則發熱如此即肝熱刑脾之證也荊芥穗牡丹皮去心白頭翁地榆芍藥防風桔梗各一分黃連一分牽牛炒熟三銖木香三銖上搗羅為細末每服二錢水一盞煎兩沸食後和滓溫服須是一年之間春夏之內風熱太甚分明識其痢疾定是伏熱方可進此藥治下赤痢身體並無增寒壯熱此名肝心變澼黃連一兩蜜浸一宿炙令香熟木香三銖上為細末濃煎陳米湯調下二錢食後和滓服治赤痢不止其脈反微小沉而又澀其身熱者死熱七日死此候極危困但吃上面通神散一兩盞發熱便退亦庶幾可治便修合上面還真散舶上黃丸吃取安校若吃通神散後發熱不退難治之也治患赤痢赤白忽因先寒瘧後變成痢忽因患痢後卻變成寒瘧但疾痢時無問赤白若有增寒壯熱並宜吃上面通神散吃了熱壯已退便修合還真散舶上黃丸吃取安校緣此證候乃水邪犯心治之不可輕也桑寄生半兩地榆芎藭防風各一兩人參黃橘皮各一兩甘草炙木香各三銖白蒺藜半兩炒去尖上為細末每服二錢水一盞煎取八分和滓熱服經數日外仍修合暖益脾藥吃治小兒疳痢所下之痢多黃沫白涕但發稀面黃腹大忽非時泄瀉不成肌肉宜吃此方使君子半兩蒸三度訶子一兩麵裹炮去核使肉白蕪荑萆薢芎藭檳榔肉豆蔻木香各一分上為末每服一錢半空心倉米湯調下量兒大小服之治小兒肝受疳氣相刑于脾所下之痢多是鮮血忽是膿血忽赤白相雜宜此方防風地榆芎藭白蒺藜去刺各一分使君子半兩蒸四五回焙木香甘草各三銖炙黃連四銖二十四銖為一兩上為細末每服一錢半非時或食後任意煎點冷吃治痰嗽益真丸人參黃耆吳白朮各半兩木香一分熟乾地黃六錢鱉甲四錢當歸去苗白芍藥白茯苓阿膠炒成珠子鹿角霜各三錢桑寄生二錢枳實一錢炒上為細末煉蜜丸如梧子大非時清湯下三十丸一日兩服治氣弱腹結白朮半兩人參一錢大芎甘草炙藿香半夏陳橘皮各一分茯苓三分草豆蔻各一分薏苡仁半兩厚朴三錢酥塗炙焦天南星二錢炮上為細末空心水一盞姜三片棗二個破之同煎七分去滓服治心氣動肝脈虧桑寄生一分茯苓防風獨活甘草炙槐角枳實各一分炒木香一錢白蒺藜炒去刺人參各半兩白朮七錢以性涼續添上為細末每服三錢水一盞磨沉香少許煎七分治精血皆虛鹿茸丸血茸半兩用酥微炙五味子山藥各一兩以上三件為末青鹽三錢令研上煉蜜和作一塊收瓷閤中臨時丸每服三十丸食前溫酒下治肝腎氣虛外應目不榮宜服此足精丸好熟乾地黃須是蒸九遍用酒製造者當歸去苗白芍藥人參山藥各半兩茄茸酥炙去皮七錢五味子六錢川椒去目一錢半青木香獨活甘菊各三錢白蒺藜杜仲去皮酥炙菟絲子酒浸一宿黃耆各半兩大芎肉蓯蓉各四銖上為細末煉蜜丸如梧子大空心濃煎糯米湯入鹽少許下五十丸又服洗肝散天麻半兩酒浸一宿濕紙裹煨白殭蠶去口去絲天南星炮各一分芎藭二錢黃耆薏苡仁白芍藥各半兩白蒺藜去刺四分甘菊甘草炙人參各三分木香一錢半沉香煎時磨少許上為細末水一盞薄荷二葉磨沉香少許同煎藥之時取七分去滓服日進二三服每服二錢補心氣人參散人參七錢伏神山藥各半兩白芍藥黃耆熟乾地黃各一分防風一分半甘草一分炙官桂去皮一分半天南星炮過二分上為細末每服二錢水一盞生薑棗少許煎七分司業六脈滿而不實寸口倍於人迎尺脈血濁而氣浮宜清血抑肺氣如此即隔通而氣歸於下不可服燥烈之藥第一方人參七錢好者陳橘皮去白一分半白茯苓麥門冬去心三錢桔梗紫菀防風各一分黃耆前胡白芍藥各一分木香一分半白蒺藜去刺桑白皮各半兩甘草二錢炙大腹皮半個上為細末每服三錢非時或食後少時水一盞磨沉香少許生薑一片同煎八分初服三四服覺膈快便不須服卻只常服丸子候三兩日間覺似壅即進一服此散子不常服又方天麻麵裹炮肉蓯蓉酒浸一宿熟乾地黃好者菟絲子酒浸一宿山藥柏子仁各半兩萆薢茯苓白芍藥各半兩牛膝去頭四分人參七錢枳實一分麵炒過木香一錢半上為細末搗薏苡仁為粉煮作稀糊丸如梧子大陰乾每日空心濃煎糯米湯入鹽下五十丸治小兒腹中有氣不散而臟腑微澀夜有盜汗使君子三錢京三稜萆薢白茯苓鱉甲人參各一分黃耆一錢獨活二分肉豆蔻二個木香一錢半甘草二錢上為細末非時水半盞煎二錢煉取三分去滓服覺氣散則已之不可多服治小兒瀉本因傷水訶子白朮白芍藥各一分甘草炙蒺藜獨活厚朴去皮各二分黃連半分炒肉豆蔻一枚上為粗末煎一錢許去滓服水七分煎至半盞久便血黃連一錢炒半焦白蒺藜去刺半兩槐花炒焦獨活訶子炮取肉枳實炒焦荊芥穗蔓荊子各一分木香一錢半白芍藥三分甘草二錢炙上為細末食後水一盞煎三錢匕取七分和滓服或煉蜜丸如梧子大清湯下三四十丸無時日一服或二服治小兒急慢驚風人參半兩好者天麻炮天南星炮黃耆芎藭各二錢薏苡仁獨活伏神蔓荊子各一分鱉甲酥炙黑木香各一分半甘草一分半夏薑製一錢半乾蠍四個全者用糯米同炒米熟為度麝香同硃砂研硃砂令兩臨脈旋入少許上為細末如飛塵入硃砂麝香少許每服二錢同煎三四沸與三匙頭如更發數即添麻黃一味並煎服不入麻黃如大府冷即添白朮末一二豆粒許同煎小兒藥宜服細末取其氣液之全唯是止瀉痢乃作丸耳治血滯精虛肛門癢痛成痔白蘞黃耆炙各半兩槐花微炒茯苓白芍藥甘草炙當歸去苗各一分南木香錢半枳實炒焦錢半白蒺藜三錢上為粗末非時水一盞煎三四錢匕取八分去滓服每日空心先服鹿茸青鹽丸方在前卻日進三四服以去痔根初服只一二服俟服青鹽丸及旬日自然可載此藥後續進兩三服二藥相兼而進久可以去其根本下血日多即令人心忪無情緒意思不悅宜戒酒慎護病雖已止宜服此二藥服藥若痔根已安藏血未止即更服後方新活鯽魚一個重四五兩以上者去腸不去鱗白礬三兩微敲研槐花半兩蒲黃一分上兌合同納於魚腹中納藥了以線系之入一垍閤中外以鹽泥固濟干十斤炭蔟之火盡取出細研如塵蒸餅丸如梧子大非時米湯下二三十丸一日一兩服少陽相火之復與水爭戰耳痛方官桂去皮三錢白芍藥白茯苓桔梗防風甘草炙羌活麻黃去節麥門冬去心各一分黃耆半兩山茵陳二錢上為粗末每服三錢水一盞生薑兩片煎至七分去滓服日三如不痛更不消服只進補腎藥小兒藏寒泄瀉不止豆蔻丸草豆蔻一枚剝開皮入乳香一塊在內復用和白麵裹慢火燒令熟去面及豆蔻皮不用上為細末以粟米飲丸如麻子大每服五七丸米飲下無時治婦人骨蒸方桑白皮黃耆薏苡仁各半兩茵芋紫蘇葉茯苓甘草各一分炙官桂去皮二分大腹皮一錢半陳橘皮三錢上為細末每服四錢水一盞姜三片煎八分服之三四日卻服後方微利不妨如腳未消即間用豆湯服一服又方牛膝去頭酒浸一宿當歸去苗茯苓熟乾地黃薏苡仁黃耆巴戟去心各半兩柏子仁鱉甲酥炙芎藭各一分桑螵蛸三分上細末煉蜜丸如梧子大空心鹽湯下五十丸小兒泄厚腹丸地榆天麻芎藭赤石脂各一分訶子皮削術各三分厚朴去皮一分姜炙木香半分上為細末棗肉為丸非時服三十丸治久瀉方白朮半兩白芍藥半兩桔梗一分白芷半兩上為細末以豬肝四兩片切如食法入少鹽和之不用油用藥先和一半於銚內先爆過次用木炭火上炙乾再傳末作兩三次食之止泄最妙又方新制人參一兩黃耆薏苡仁糯米末阿膠炒木香茯苓半夏如法制甘草炙鱉甲酥炙各一分白朮半兩肉豆蔻大者兩個上為細末不羅非時以水一盞生薑一片棗子一個破之同煎三錢取七分服去滓服至十來服或七八服覺血淡或微有些小腹痛每服加白朮少許及烏梅肉半個煎但血旋止和胃藥藥未可全去只桔梗枳實二味以白蒺藜代之痢稍止未全減臟腑忽下血猶未止卻服此方黃耆輕炙白蒺藜去刺各半兩白蘞茯苓槐花微炒獨活各一分訶子皮四錢木香一分黃連燒焦二錢上為末煉蜜丸如梧子大非時清湯下二十丸至三十丸米湯亦得又方訶子炮令大熟山藥人參白朮各半兩熟乾地黃一兩半地黃最能補而去肝風但通腸於利藥中使非訶子不能為功木香一分桑寄生一分上為末煉蜜丸如梧子大空心米湯下三十丸常服以去痔疾又能足血進飲食香術丸白朮一兩炒丁香一錢半半夏木香炮蓬莪朮各一分防風麥蘖炒神麯炒各半兩茯苓半兩甘草炙一分上為末水麵糊丸如梧子大每朝米湯下三十丸食後服
