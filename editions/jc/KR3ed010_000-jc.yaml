body:
  text: 附錄一黃丕烈跋向聞白堤錢聽然云北宋時有名醫因治蔡京腸秘之症只用紫菀一味其病遂愈醫者由是知名其人蓋史載之也後余友顧千里遊杭州過石塚嚴久能於湖上出各種古書相質歸為余言中有史載之方二卷真北宋精槧余心嚮往之久矣客歲錢唐何夢華從嚴氏買得今夏轉歸於余余檢其方果有大府秘一門用紫菀者始信錢丈之言為不謬特未知用而見效之說出何書耳至於版刻之為北宋確然可信字畫斬方神氣肅穆在宋槧中不多覯其避諱若炅字尤他刻所罕千里豔稱於前夢華作合於後余於此書可云奇遇余喜讀未見書若此書各家書目所未收惟宋史新編有云史戰之方二卷戰者以載字形近而譌無可疑者余重其書之秘出白金三十兩易得重加裝潢遇上方切去原紙處悉以宋紙補之尾葉原填闕字亦以宋紙易去命工仍錄其文想前人必非無知妄作者也上下卷通計一百單七翻合裝潢費核之几几乎白金三星一葉矣余之惜書而不惜錢其真佞宋耶誠不失為書魔云爾嘉慶丙寅立冬後一日蕘翁黃丕烈識於百宋一胋附錄二王振聲跋此書自郡齋讀書志已下皆未著錄郡中黃復翁得之石塚嚴氏此即從之過錄者也載之名不甚著其始末無考惟據復翁跋稱宋稗類鈔載眉州朱師古得異疾趨郡謁史載之宋時眉州屬成都府是載之為成都人也書錄解題指南方二卷蜀人史載之撰卷數雖同書名則異不知即此書以否然稱為蜀人與宋稗類鈔合其非二人可知是載之名堪也而阮文達提要謂字裡未詳蓋誤仞載之為名矣北窗炙輠錄載載之療蔡元長疾元長熙寧三年進士靖康中貶死是載之為神宗後人也其大略可見者如此按載之療元長大腸秘固市紫菀以進須臾遂通此書大府秘門正有用紫菀一方而師古異疾載之名為食掛謂出素問製藥服之三日頓愈宋稗類鈔不言所用何藥此書亦無食掛方論蓋載之所著當不止此或在解題所稱指南方中而此書非即指南方又可想見也書中炅戌驚微等皆為字不成而完丸等不避欽宗嫌名蓋刻於靖康以前後翁定為北宋精槧不誣也咸豐戊午季春既望文邨王振聲書於鐵琴銅劍樓
