body:
  text: 卷上四時正脈春春脈弦其氣來柔軟弱虛而滑端直以長名之曰弦反此者病其氣來實而強名為太過病在外其氣來不實而微此為不及病在中太過則令人善忘忽忽冒眩巔疾不及則令人胸痛引背下兩脅胠滿夏夏脈鉤其氣來盛去衰反此者病其氣來盛去亦盛此為太過病在外其氣來不盛去反盛此為不及病在中太過則令人身熱而膚痛為浸濕不及則令人煩心上見咳唾下為氣泄秋秋脈浮其氣來輕虛以浮其氣來急去散故曰浮反此者病帝曰何如反其氣來毛而中央堅而兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛慍慍然不及則令人喘呼吸少氣而咳上氣見血下聞病音冬冬脈營其氣來沉而博故曰營反此者病其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢眇中清脊中痛少腹滿小便變中脾無善脈止見惡脈蓋脾脈以和緩為主故四時之脈雖不同春脈弦夏脈鉤秋脈毛冬脈營皆要有脾脈若脾脈不見便是五臟真脈見真脈見者死所以脾無善脈者謂其常脈便是吉脈其太過不及皆為病脈太過則令人四肢不舉其來如水之流者太過也濕勝則然耳不及則令人九竅不通名曰重強其來如鳥之啄者不及也土不用事則然耳濕勝而其脈如流邪乃傷腎土不用事而九竅不利因受木所制木製則脾受水矣九竅不利故多生浮腫脹滿之疾久而成水真脈真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而博如循薏苡纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至博而絶如以指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死厥陰所勝生病運氣所勝飧泄食減體重煩冤腸鳴腹支滿甚則忽忽善怒眩冒巔疾脅痛而吐甚衝陽絶者不治司天所勝體重肌肉萎食減口爽目轉耳鳴胃脘當心而痛飲食不下舌本強食則嘔飧泄腹脹溏泄瘕水閉在泉所勝酒淅寒如瘧善伸數欠心痛支滿兩脅裡急飲食不下鬲咽不通食則嘔腹脹善噫得候與氣則怏然如衰身體皆重少陰所勝生病運勝瘧少氣咳喘血溢泄注下嗌燥耳聾中熱肩背熱天勝喘嘔寒熱喋鼽衄鼻窒甚則瘡瘍脅痛善太息胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘唾血鼽衄溺色變瘡瘍胕腫肩背臂臑及缺盆痛地勝腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛齒痛頰腫惡寒發熱如瘧少腹中痛腹大太陰所勝生病運勝腹痛清厥意不樂體重煩冤肌肉萎足萎不收行善瘛腳下痛飲發中滿食減四肢不舉腹滿溏泄腹鳴反下甚而大溪絶者不治天勝胸中不利陰萎氣大衰而不起不用當其時反腰脽痛動轉不便心下痞滿少腹痛時害於食胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸地勝飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病血見少腹痛腫不得小便病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別陽明所勝生病運勝兩脅下少腹痛目眥痛皆瘍耳無所聞體重煩冤胸痛引背兩脅滿且痛引少腹甚則喘逆氣咳肩背痛尻陰股膝髀踹胻足皆病天勝脅痛目赤掉振鼓栗筋痿不能久立小便變寒熱如瘧甚則心痛左胠脅痛寒清於中感而瘧咳腹中鳴注泄鶩溏心脅暴痛不可反側嗌乾面塵腰痛丈夫㿗疝婦人少腹痛目昧眥瘍瘡痤癰地勝昏病喜嘔嘔有苦太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱太陽所勝生病運勝身熱煩心躁悸陰厥上下中寒譫妄心痛甚則腹大脛腫喘咳寢汗出憎風天勝心熱煩嗌乾善鼽喋喜悲數欠熱氣妄行善忘甚則心痛嘔血血泄鼽衄善悲時眩僕腹滿手熱肘攣掖腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炱渴而飲地勝少腹控睪引腰脊上衝心痛血見嗌痛頷腫少陽所勝生病天勝咳喋鼽衄鼻窒瘍寒熱胕腫心痛胃脘痛厥逆鬲不通熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍唾血煩心胸中熱甚則鼽衄地勝注泄赤白少腹痛溺赤甚則血便少陰同候六氣復而生病厥陰之復少腹堅滿裡急暴痛心痛汗發嘔吐飲食不入而復出筋骨掉眩清厥甚則入脾食痹而吐少陰之復燠熱內作煩躁鼽喋少腹絞痛火見燔焫嗌燥分注時止氣動於左上行於右咳皮膚痛暴喑心痛鬱冒不知人乃灑浙惡寒振栗譫妄寒已而熱渴而欲飲少氣骨痿膈腸不便外為浮腫噦噫瘡瘍癰痤甚則入肺咳而鼻淵太陰之復體重中滿食飲不化陰氣上厥胸中不便飲發於中咳喘有聲頭頂痛重而掉瘛尤嘔而密默唾吐清液甚則入腎竅泄無度少陽之復驚瘛咳衄心熱煩躁便數憎風厥氣上行面如浮埃目而瞤瘛火氣內發上為口噤嘔逆血溢血泄發而為瘧惡寒鼓熛寒極反熱嗌絡焦稿渴引水漿色變黃赤少氣脈萎化而為水傳為浮腫甚則入肺咳而血泄陽明之復病生胘脅氣歸於左善太息甚則心痛痞滿腹脹而泄嘔苦咳噦煩心病在鬲中頭痛甚則入肝驚駭筋攣太陽之復心胃生寒胸中不利心痛痞滿頭痛善恐時眩僕食減腰脽反痛屈伸不便少腹控睪引腰脊上衝心唾出清水及為噦噫甚則入心善忘善悲論六氣所生之病五行之為病一也而所生之氣不同如木之所至為風化而病之生不獨止於肝火之所至為熱化而病之生不獨止於心此司天司地統歲紀運之不同故為病亦從而各異又有乘年之虛過月之空失時之和或勝而所勝受刑或復而制於所勝且以經言之天火下臨則肺氣上從則白起金用而草乃眚燥氣下臨則肝氣上從則蒼起木用而土乃眚以常所勝而論之則火至而肺病金至而肝病今也天火下臨則金以從天之氣而白乃用故病反生於肝天金下臨則木從天之氣而蒼乃用故病反生於脾類舉而推則厥陰司天脾氣上從而水斯眚太陽司天心氣上從而金斯眚少陰司天肺氣上從而肝斯眚太陰司天則腎氣上從而火斯眚皆可知矣此天度之尊獨異於他經言天能制色以其能制勝己而使不為害至於司地則氣化之正各隨其證耳若夫紀運之歲之不同則又視其司天之氣化如六甲之歲陽土當運有陰凝流衍之布宜與六己之歲不同也然己巳己亥與六甲之歲同六庚多肝病而庚寅庚申之歲金不能制肝六戊多肺病而戊辰戊戌之歲火不能害肺氣化所至譬如權衡可即其氣以求其病惟勝復之候不同難以前期亦隨其氣之多寡以求其證勝之為病輕復之為病重勝則所不勝者順受其克復如報怨仇焉此又不可不知也今以木之受病本於肺金之所制則不過如肺氣有餘凌犯於肝生眼昏背癢耳無所聞胸痛體重之病耳若乃木化之盛肝氣妄行大傷於脾則金必相救邪反傷肝能使人體重煩冤胸痛引背兩脅滿宜痛引少腹故經言上應太白星者謂金之復也雖然人之氣猶之天地之氣五臟之氣即五運之氣三陰之氣即六氣之變顧一身之氣多寡之如何亦不必因天地之氣化所生己亥之歲人多肝病而有病肺者子午之歲人多心病而有病腎者此一人之身自有天地之氣化調治之法與五運六氣所至之法同至於病一也而所生之病所受之本所以至病之由不一者或以本藏有餘而成或以本藏不足而成或經絡所過之處同而成經之所載二火所生之病雖輕重不同而其實則一太陽太陰水土共胞寒濕同化所生之病亦類目會衆筋而病變多端心統五臟而病生奇怪清濁異源各有其機表裡殊狀各有其應今詳舉之以明治病之訣大府泄肝熱刑脾而泄即經言飧泄餘證當腸鳴腹支滿口膠渴小府赤宜涼其肝輕益其胃診其脈六脈輕弦胃上得肝脈不至大弦然六脈雖弦亦不必有骨力以泄則氣虛不實故也宜用荊芥散荊芥穗一分防風芍藥訶子皮羌活甘草各一分白蒺藜半兩厚朴十銖去皮木香三銖上為細末非時以水一盞棗一個同煎三錢匕和滓服脾濕而泄經言腹滿溏泄餘證腹痛體重食減甚則足痿行善契腳下痛宜用削術豆蔻散草豆蔻削術訶子皮各一兩大芎陳橘皮各半兩甘草藁本各八銖獨活藿香各一分上為細末空心水一盞薑兩片棗兩個同煎三錢取八分和滓服腎水之寒亦生溏泄以寒濕同化所生之病一耳經又言寒迫下焦傳為濡泄陰氣入腎竅泄無度洞泄皆屬於水土之所生其證體重食減腹痛四肢不舉甚則注下赤白腰膝痠痛股膝不便若脾氣之濕則六脈渾濁如革濡散而大如按泥漿加之腎寒則又沉伏遲弱動而無力宜並治其水暖其脾腎暖脾藥宜以削術豆蔻散暖腎藏方萆薢勝金丸萆薢訶子各一兩石斛續斷芎藭附子巴戟去心官桂藁本各半兩蓬莪朮山茱萸細辛當歸獨活各一分上為末煉蜜丸如梧桐子大空心米湯下五七十丸又方宜服舶上硫黃丸方見痢門肺金之勝亦生腹鳴溏泄肺主清肅之氣流入於中變成寒中鶩溏又肺主少腹故生斯病餘證少腹痛中清胠脅痛其脈六脈毛而微不浮毛為肺脈微則泄而氣弱初泄則本肺脈一指偏一二日則變而微但不浮耳尺澤沉而小擊宜溫其肺四味芍藥散吳白朮芍藥桔梗香白芷上等分為末非時水一盞生薑三片同煎三錢匕入棗二個取八分服大府祕肝心氣實風血相搏大府結澀口苦舌粗甚則口乾膠小府赤頭痛眼昏六脈洪大而實宜用柴胡湯柴胡前胡防風杏仁去皮尖羌活茯苓甘草芍藥各一分麥門冬去心一分乾地黃八銖半夏二銖上為粗散食後並非時水一盞蔥白一根同煎三四錢匕取八分去滓服肺氣上實其氣上蒸不能傳送大府祕熱其脈浮而疾尺澤脈短寸口脈大宜用柴胡湯加紫菀麻黃各一分良寒濕之勝大府反祕經言陰氣不用便堅以土不用事脾胃不動無傳送耳其陰具水土之證脈亦如之宜用大腹皮散陳橘皮一兩青橘皮大芎五味子芍藥香白芷甘草各一分大腹皮草豆蔻各半兩木香檳榔各四銖上為細末每服三錢匕非時水一盞煎八分和滓服元氣虛弱腎水空虛胃無津液大府澀遲六脈微而虛宜用蓯蓉粥肉蓯蓉一分米一掬先洗蓯蓉令淨切令極細同米用水兩碗以上煮作稀粥既熟入少許蔥並薄入鹽醬調和空心投三四盞小府祕小府之祕其狀難識有淋有癃有澀或疼不疼肝心之氣盛實而熱小腸氣虛熱氣流入膀胱遂成小府赤澀之病其脈數而輕弦尺澤弦而長又微緊或心脈長皆主此病宜用此方茯苓半兩麥門冬去心芍藥前胡杏仁去皮尖桔梗防風各一分荊芥三銖甘草炙木通各四銖上為細末食後以水一盞蔥白一支同煎三錢匕和滓服又方宜服此五苓散肝經之熱小府赤痛六脈弦急而長又發寒栗宜用蔓荊湯方蔓荊子羌活獨活麻黃荊芥穗芍藥木通甘草上等分前法煎食後服濕氣寒氣之勝同犯於心心氣上行不得小便小府不快宜服削術草豆蔻散又服此大芎湯大芎一兩蓬莪朮半兩木香四錢茯苓半兩甘草萆薢各一分上為細末空心水一盞入鹽少許同煎三錢匕和滓服元氣虛弱腎氣不足膀胱氣虛衝任脈虛丈夫㿗疝婦人癊閉宜服此方其脈六脈皆動細數而輕弦腎脈小擊而沉膀胱澀而短五味子一兩血茸萆薢牛膝芎藭各半兩干熟地黃一兩蓬莪朮青鹽各一分上青鹽一味自為細末餘七味為細末蒸餅丸如梧桐子大空心清湯下五七十丸身熱寒邪所傷身能發熱寒氣外固陽氣內拒鼻塞氣粗聞氣出如火此當發其寒六脈浮而輕疾散滿指下麻黃去根節削術各半兩藁本芎藭官桂芍藥獨活甘草以上各一分細辛四銖上為粗散空心並非時水一盞生薑一片煎三錢去滓服心火獨盛少陰少陽之勝身熱小府赤大府祕頭痛口乾舌粗骨疼六脈洪大而實有骨力又數宜用此方茯苓麥門冬去心芍藥麻黃前胡柴胡甘草羌活桔梗各一分牡丹皮四銖上如前法為粗散肝氣之熱身亦發熱其狀與心火之勝同以風熱同化木火相助其候同也然肝之發熱所以不同者雖熱而往往自聞其寒多覺背上脊膂灑灑振寒並兩足多冷膠涎甚則嘔逆而吐六脈弦急而長其他與心火勝之亦同然心火之勝脈必洪而肝熱即洪大而弦然亦有上於弦而不洪大者以風氣之獨勝耳宜用此方荊芥穗羌活獨活芍藥防風麻黃去節連翹子秦艽蔓荊子干蔢苛甘草等分上為粗散食後水一盞煎三錢取八分去滓和滓任意又看其人氣實肝藏熱多至於生涎則加天南星半夏白殭蠶乾蠍各少許天南星白殭蠶可與衆藥等半夏蠍隨意加減不必多涎結而大府祕則以牽牛和上件藥服以疏為度身寒經言陰盛生寒陽盛生熱元氣虛乏腎水極寒發為寒戰冷汗自出六脈微細而沉寒邪犯心則腎脈必擊而沉心下大動不安甚則仆倒宜先暖其腎後保其心暖腎臟方牛膝酒浸一宿石斛巴戟去心萆薢鹽水煮芎各半兩續斷茯苓附子炮當歸細辛五味子菟絲子各一分酒浸兩宿上為末煉蜜為丸如梧子大空心米湯下七十丸濕氣之勝汗出憎風肌體多冷畏風食減倦怠無力六脈渾濁而緩弱大而散面目無光宜服前暖腎丸並服此方白朮陳橘皮芎各半兩細辛藁本獨活甘草炙藿香官桂各一分草豆蔻人參半兩乾薑四銖上為末煉蜜和丸如梧子大空心米湯下五十丸頭痛頭痛之狀最為難辨大風入骨而痛大熱入骨而痛痰伏於胸中而痛元氣虛微而痛心火之勝頭痛六脈之應皆應於心即用涼心藥風氣之勝而頭痛六脈之應皆屬於肝即用涼肝藥氣熱而生涎亦能令人頭痛即用前取涎藥腎水之勝陵犯於心經言心氣上行痛留眉頂間甚則延及胸頭痛腦戶間痛宜暖其腎獨寒濕之氣初作未至犯心寒邪所客多襲於陰上貫風池熱府令人頭目不利腦後兩大筋迸急眉目昏眩此為寒邪未入五藏六脈皆初傷寒之屬浮散而數宜用前發汗藥腹痛人有病腹痛者其狀多端經之所言亦多變濕邪之勝腹滿而痛食減體重四肢不舉腹鳴腸泄宜用此方神和散草豆蔻肉豆蔻陳橘皮白朮各半兩厚朴去粗皮丁香木香大芎蓬莪朮各一分吳茱萸三銖訶黎勒三銖芍藥十銖上為細末每服三錢空心水一盞棗兩個同煎八分和滓服寒冷食物所傷厥入胃腹中撮痛即與前寒濕勝痛之脈不同若寒濕之氣勝而腹痛六脈皆微細而沉時時小擊經訣所謂陽弦頭痛陰微腹痛是也至於為冷寒之物所傷則六脈又緊而微緊應腹有形此為物所傷者脈必有形而為濕氣所傷者脈止於微而已宜用神和散加大腹皮半兩主之覺冷物未化即加青橘皮少許每服入半夏少許主之清厥入胃兩脅下痛及小腹痛此肺之清肅之氣所成六脈當急而微弦肺脈獨大而實左尺微小急蓋清肅之氣流入於中寒聚而小腹有形經言連小腹而作寒甚則為婦人癥瘕丈夫㿗疝之類肺以毛為主若浮則為熱沉大為冷至於寒之所聚則大者斂而為小急又甚則緊緊為痛應腹有形亦各從其類也宜暖行肺氣以散之陳橘皮蓬莪朮紫菀芎京三稜當歸延胡索官桂桔梗甘草炙木香各一分大腹皮芍藥各四銖白朮半兩上為細末服時水一盞生薑二片同煎三錢匕取八分和滓服至於肺氣之勝已傷於肝則又能體重煩冤胸痛引背而痛宜服前方又服此暖行肝氣方人參散人參半兩當歸桑寄生白蒺藜蓬莪朮芎獨活京三稜甘草各一分炙藿香四銖五味子半兩木香四銖上為細末每服三錢服時水一盞棗二個同煎八分服人有病胃脘當心而痛食已而痛又甚連腹中而急六脈弦緊而長宜用肝藥人有病兩脅下非時氣痛不安如生積聚一腹中鼓動搖悶不安甚則生氣塊上衝咽喉頭目俱迸口舌膠黏小便赤黃衝心而痛夜臥不安此為肝涎與血相聚致生此疾其脈當洪大沉實而有骨力以肝脈之熱生風而痛則脈弦而長今反洪大沉實者此為涎伏之也宜用荊芥散荊芥穗連翹羌活牡丹皮黃芩杏仁當歸芍藥山梔子大黃醋煮蔓荊子各一分上每服三錢食後水一盞生薑一片半夏末少許同煎取三四沸和滓服大府不甚祕減大黃若大府祕甚自作大黃末每服酌量加減進服其大黃一味自修制臨時末素問舉痛論云寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急則外行小絡故猝然而痛得炅則痛止其脈正與寒濕之氣脈同宜神和散舉痛論云寒氣客於經脈之中與炅氣相薄則脈滿脈充大而血氣亂故痛甚不可按其脈散滿指下充大而至數不多卻不甚有骨力宜去其寒而行其血氣當歸大芎蓬莪朮茯苓大腹皮陳橘皮青橘皮延胡索官桂各一分木香四銖芍藥十銖上為細末每服三錢非時水一盞煎八分服舉痛論云寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散痛其脈亦差大差緩而沉宜用前藥青橘皮者舉痛論云寒客於夾脊之脈則按之不能及故按之無及夾脊乃膂脈之所行其脈當尺澤沉而擊宜行其腎經以去其寒烏藥一分芎當歸京三稜蓬莪朮延胡索各一分木香鱉甲各四銖甘草炙三銖上為細末空心水一盞煎三錢服舉痛論云寒氣客於衝脈衝脈起於關元隨腹直上客寒所犯則脈不通脈因之則氣不通故喘動應手其脈當實大有形不勻輕滑而又緊來疾去遲如有物制之宜通其脈行其氣桔梗半兩大腹皮芍藥木香當歸陳橘皮枇杷葉去毛半夏自為末每服入兩豆許芫花好醋於土鍋內煮過乾炒令煙出焦黑以上各一分上為細末每服三錢生薑三片同煎八分服以大腑通疏為度宜服神和散之餘如此夕喘宜調暖其肺舉痛論云寒氣客於背俞之脈則脈澀脈澀則血虛血虛則痛背俞主於心故相引而痛按之則熱至熱氣至則痛遂止脈澀以血虛而不行其脈六脈細數而肝心尤微心脈如帶芤重按即缺往往身有汗宜足其血以保其心人參一兩當歸半兩木香延胡索烏藥官桂甘草茯苓防風各一分沉香三銖陳橘皮十銖闕上語舉痛論云寒氣客於厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急引脅與小腹痛矣其脈皆輕帶弦肝脈連腎脈弦長而緊甚則透過尺澤而弦宜用此方白蒺藜半兩炒去尖蔓荊子一分芍藥獨活蓬莪朮甘草各一分麻黃十銖去節上為細末每服三錢空心水一盞棗兩個同煎八分服舉痛論云寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故猝然成積其脈沉大而實膀胱動而有聲宜通其小腸血茸大芎蓬莪朮各半兩萆薢木香當歸茯苓各半兩青鹽三銖上為細末蜜丸如梧子大空心清湯下五七十丸舉痛論云寒氣客於五臟厥逆上泄陰氣竭陽氣未入故猝然不知人事氣復反則生矣其脈伏而大極無骨力三部皆芤身有冷汗宜灸氣海後用暖藥舉痛論云寒氣客於腸胃厥逆上出故痛而嘔其脈細而滑宜用神和散加茯苓人參各半兩脹滿人有病腹脹滿善噫兩脅滿咽鬲不通此肝勝也其脈弦而長宜涼其肝人有病腹大小腹中痛惡寒發熱如瘧小腑赤其脈洪大此心熱也宜涼其心人有病小腹痛睡不得小便頭痛目似脫頂似拔腰似折此土濕之勝宜暖其脾其脈當濁而動人有病右胘胠滿腑腫心痛肺䐜腹大滿膨脹而喘咳此氣為火所勝其脈兩手寸口洪大肺上亦洪骨力小如心脈此為心肺相持宜解其金火之熱以平其心肺黃耆半兩麥門冬去心茯苓紫菀麻黃去節防風各一分羌活甘草炙四銖杏仁十四個去尖上為粗散非時水一盞薑一片棗一個同煎三錢去滓服人有病身腑腫腹滿仰息泄注赤白咳血此少陽之勝與火勝同候其脈亦然以前方主之喘世人論凡喘者皆以為肺然有服肺藥而不愈者遂以肺不受藥為難治何以言之繆也又或以肺熱而喘誤投涼藥此又近似之言止可以知肺喘而未足以明五臟之喘且以經言之所言諸痿喘嘔皆屬於上未嘗以喘屬於肺至於言五臟之多寡六氣之勝復則喘之所生可指其狀而明藥之所投亦可以隨其證而效今人有病胸中煩熱嗌乾右胠滿咳喘唾血肺䐜腹大膨膨而喘者此火之刑金肺傷而喘也宜用此方麥門冬去心半兩桔梗麻黃去節紫菀杏仁去皮尖柴胡前胡甘草炙貝母以上各一分去心羌活三銖黃耆十銖上為粗散每服三錢水一盞生薑三片煎至七分去滓溫服人有病左脅痛寒清於中咳而喘此為肺之清氣所成宜用此藥六脈毛而微腎脈伏而小比之火之盛刑金則異矣蓋火盛刑金而喘則六脈純得火脈疾大而有力若寸口偏大而關脈帶芤即須唾血人有病腹大脛腫喘咳寢汗出憎風胸中滿食不消化食減體重六脈沉重而濁渾渾革至如物制之此為腎寒大過宜暖其腎續斷牛膝細辛五味子巴戟附子當歸菟絲子補骨脂各一分大芎萆薢各半兩木香三銖上煉蜜丸如梧子大空心鹽米湯五七十丸以神和散並進人有病肝臟風壅積涎所聚伏膈間口乾而膠食即噁心全惡肉味心躁不安夜臥不得開咽喉隔塞如物抵築多喘診其脈六脈皆大而沉伏重手取之隱隱然骨間乃得再再尋來疾去遲宜用治涎藥荊芥穗天南星防風羌活白殭蠶連翹獨活麻黃乾荷葉乾蠍天麻炮半夏上等分修治為細末每服三錢入半夏末一兩豆許水一盞生薑三片煎七分和滓飯後服有人得此涎候卻緣久病而虛又誤服熱藥或元氣本虛六脈大而無骨力卻浮洪而數重手按之則浮指而虛有表無里卻不宜用前方此病難治當用此方人參半兩天南星炮防風獨活麻黃天麻炮枇杷葉去毛半夏羌活以上各一分白殭蠶玄口薏苡仁各十銖上除半夏一味自為末余為細末非時水一盞薑三片煎至七分又宜時時以補藥助其元氣而徐以此壞涎藥撓之人有病久患咳嗽虛萎氣乏胸中氣微不能報息六脈虛微而數此之一候並帶勞疾證即為難治若脈止虛微不浮而數寸尺調勻即藥到便安若浮數而虛亦勞也若浮大疾數而虛輕手取之全無骨力重手按之全不應指此不治之證肺萎當用此方人參半兩五味子茯苓各半兩鱉甲酥炙山藥麥門冬去心甘草枇杷葉去毛各一分黃耆紫菀各十銖半夏阿膠炙透各四銖上為粗散生薑三片每服入半夏一兩豆許飯前服或非時服之又宜服補腎氣藥以歸其元氣每服三錢水一盞煎至七分腳痛腳氣之病蓋由有寒濕之勝故經於太陰之勝言足脛腑腫於太陽之勝言至引陰股筋肉拘苛又言歲土太過甚則肌肉萎足痿不收行善瘛腳下痛飲發中滿四肢不舉此寒濕之氣所成也然天下之病固有似是而非本異而標同用藥過差則利害相反若腳氣之病本於寒濕之勝而至於肺熱而病生於足胃熱而風生於足與腳氣相似而寒熱殊狀試別而明之熱而足痛者以肺經之所行也故經言歲金太過則股髀踹䟰足皆病焉胃熱而足病者抑以宗筋不行而傳為痿厥也今有人病足痛得水土寒濕之狀六脈沉伏而動上濁下虛尺澤微而澀宜暖其下用此方牛膝半兩黃耆半兩獨活當歸石斛附子萆薢五加皮各一分天麻炮大芎續斷各十銖細辛木香各三銖官桂四銖芍藥一分上為末薏苡粉煮作稀糊丸如梧子大空心服五七十丸溫酒或鹽湯下肺乘熱而足病則左手一手脈全微而細左尺又小搏擊而沉右手脈偏有骨力洪大而肺脈尤甚再尋虛弦而長用修崔氏紫蘇方服之蓋世人多以崔氏方治腳氣而得效不知此方只可治肺熱腳痛耳紫蘇子芍藥官桂茵芋茯苓大腹皮桔梗甘草炙各一分羌活三銖麻黃去節一兩黃耆半兩上為粗散生薑一片煎三錢以為飲服胃熱而宗筋不潤則腳弱無力兩足痠軟或帶微腫診其脈胃脈一指弦而長又微帶疾六脈差大宜用此方大腹皮半兩茵芋八銖杏仁去尖茯苓芍藥當歸陳橘皮甘草炙薏苡仁各一分青橘皮四銖芎十銖上為粗散非時薑煎仍以前暖腎藥壯元氣藥相兼而進若服此藥大府微利即住此卻進補藥兩三日待定帖仍進此藥脈要精微解經曰春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室故曰知內者按而紀之知外者終而始之此六者持脈之大法以經意考之以四時之脈分表裡之淺深而決之以內外之辨且以春日浮如魚之遊在波則陽氣之萌脈雖見而未出於膚夏日在膚泛泛乎萬物有餘則脈已在膚矣秋日下膚蟄蟲將去則秋陰氣之至脈雖下膚而未至於沉冬日在骨蟄蟲周密則脈已沉矣以是知內者按而紀之以明脈之在裡也如秋日之下膚冬日之在骨是也知外者終而始之以明脈之在表也如春日之浮夏日之泛是也然知內者必曰按而紀之者蓋脈之在內非深按之無以得其實知外必曰終而始之則初按而病已見矣故因其病以推原其本啓玄子乃以知內為知脈知外為知色殊非黃帝所謂持脈之大法也細舉而明之心脈搏堅而長當病舌卷不能言凡脈之搏以有所犯而鬼勝則搏心脈之搏以腎邪犯之也病舌卷而不能言舌雖應心而舌本蓋少陰經之所散也治之之法不獨涼其心且暖行其腎其大而散當消環自己若心脈之芤雖芤而軟縱失血亦當溫加之以胃藥紫蘇子黃耆芍藥官桂獨活茯苓大腹皮甘草炙各一分天麻炮十銖杏仁四銖去皮尖上為粗末薑煎不計時候用水一盞煎七分寸口脈沉而弱曰寒熱及疝瘕及少腹痛又曰脈急者疝瘕少腹痛病同而脈異啓玄子遂以為經傳之誤亦不知變矣寒疝之為病有寒清連於小腹而為疝故止言寸口脈沉而弱不分左右之脈皆沉故也右沉則肺冷而寒清之氣流入於中左沉則心氣不足血為寒邪所犯而少腹痛至脈急曰疝少腹痛則言六脈之皆急也蓋經嘗言診得心脈而急為疝正謂此矣寸脈弱而疝者宜溫其中脈急而疝者宜緩其中寸脈沉而疝者宜用此方當歸牛膝各半兩烏藥木香京三稜蓬莪朮延胡索茴香官桂萆薢各一分芍藥大芎各十銖沉香四銖血茸細辛各五銖益智子三銖上為細末蜜丸如梧子大空心清湯六七十丸脈急而疝宜用此方蔓荊子麻黃芎蓬莪朮甘草炙木香茯苓各一分芍藥半兩獨活十銖上為細末每服三錢生薑三片水一盞煎至七分不計時候服明熹脈春戌夏醜秋辰冬未四時之喜神取五行之養氣為用皆歷三辰而數如春以戌為喜神即正月在戌二月在亥三月在子四時放此而推若於脈中得之犯他脈喜有喜慶之事四時脈皆於胃中見以五行皆資土以致用而周身之脈亦因胃脈然後見於氣口如春脈以弦為主須六部脈皆循循不急不絶不緊不數而胃脈微弦而緩弦為春緩為本六脈無犯主一月內喜應若正月於戌日見二月於亥日見三月於子日見則旬內應如胃脈帶弦而毛則主災夏脈洪為主六脈皆隱隱而大不散不浮不滑不數胃脈微洪而緩洪為夏緩為本脈六脈無犯一月內喜應旬內得脈皆不出旬秋脈主毛胃脈上輕帶毛而緩又須有根蒂此一脈難辨如四時之脈蓋若毛而輕如風如氣則反為災不為喜脈惟不浮不輕緩緩而徐浮手按之乍如秋脈重手取之則去來如一壓之不散舉之不輕然後為喜脈日辰之應與春夏同法冬脈最為易辨但胃脈沉而不擊即是傷寒論病有懸性命於毫髮之端決死生於頃刻之下死生之間系醫者之工拙醫者之工則病之痊愈速如轉圜醫者之拙則所投之藥過於白刃此傷寒之病非獨傷人之急醫者之難事也古人有言一日二日在於皮膚四日五日傳之臟腑故皮膚之間可汗傳臟腑之間可下世之學者未嘗不宗之以為定論然不知人之有虛實則病之有輕重病之有輕重則傳之有遲速忽有經兩日三日而尚在皮膚忽有初經兩日三日而傳臟腑善為醫者當審察其脈審其病之所在而已嘗以治傷寒之病有四失一失之愚蓋傷寒之病其始在於皮膚其次傳之臟腑當皮膚之間可汗於臟腑之間可下苟不辨陰陽不分內外當汗而下當下而汗誤投藥餌以傾人性命此一失之愚也二失之不精蓋傷寒之病傳之臟腑則證候多端千變萬化莫能盡究其毒氣之在肝者不可疏脾在心者不可疏肺五臟之治余皆同此醫者治之決以為病之所傳在於何臟方之所投當以何藥病之所減當以何時藥之一投遂可平復苟不知病之源流不識病之傳受誤投藥餌以希苟合不幸而少有差誤人之傾危可立而待此二失不精也三失之怯蓋傷寒熱毒傳在五臟攻損正氣其毒氣之盛如煙如霧熏炙三焦致令病危困不思飲食醫者反以為胃氣之虛不肯通疏遂見傾損性命但今患傷寒熱毒之人飲食不進大府不通小便黃赤病者危困即先定其病之所傳在於何臟急以疏轉之藥取其毒氣其病勢輕減則飲食增加而平復如故矣此三失之怯也四失之暴蓋治傷寒之法既失之愚又失之怯則不精不詳者不可容易言也愚因言治傷寒之怯切慮後之學者心術未明見識未到但務以不怯為志妄投轉藥以傷人性命此余所以言四失之暴也後之學者苟能明此四失亦足以識治傷寒之大略至於陽毒所次陰毒所注其傳在五臟則臟證各殊貫於六腑則腑證各異其傷人之急者惟二感尤為極重余今輒以病證脈候陳其一二庶幾世人緣此之傳也一日巨陽受之巨陽之脈起於目內眥上額交顛上入絡腦下項循膊內夾背抵腰中在手為小腸在足為膀胱故頭項腰背強其脈當疾數而浮以散如新沐浴如風而左尺脈微緊而數二日陽明受之陽明主肉其脈夾鼻絡於目故身熱目疼而鼻乾不得臥其脈又經於腹背上頭項在手為大腸在足為胃診其脈當疾數而浮漸漸按之如通於里以陽明為宗筋而胃脈受之又漸入於裡六脈雖浮數而胃脈一指微洪而數三日少陽受之問其脈循脅絡於耳故胸脅痛而耳聾又起於目鋭眥上抵頭角下耳後其脈當疾數而利得六七至以上而肝脈又差數此三陽受病皆屬於表故其脈疾數而浮以其未入於臟腑故言汗而已四日太陰受之太陰脈布胃中絡於嗌入胃上隔夾咽連舌本而散於舌下其脈當疾數而洪大有骨力胃脈差大五日少陰受之其脈直行者從腎上肝鬲入肺中循喉嚨夾舌本故口燥舌乾而渴其脈最為洪大六七至以上心脈隱隱應指來去如一六日厥陰受之厥陰之脈自足上循陰器抵少腹又上貫鬲故煩滿而囊縮其脈疾數如長三陰三陽五臟六腑榮衛不行五臟不通則死大抵三日以前為三陽受病其脈在表宜汗三日以後三陰受病其脈在裡宜泄若初經三日其脈疾數大表裡如一即不可汗亦不可下只以解利藥通其中而已一二日脈氣疾數以溫辛發散藥汗之而愈藥中亦須有通表解藥不可純用熱藥既汗之後脈當安和綿軟不疾不數如老年衰削人脈輕手按之綿綿不絶重手按之隱隱不乏即自然安寧若既汗之後疾數不解即難治加之以結則困重或至於死蓋結脈疾數而懸絶纍纍如珠而又不流利與滑不同但逐部位通流於指如滴水起頭是也然初得病一日二日內有增寒壯熱脈輕而浮乃謂之傷寒若才得病並無增寒頭疼欲碎身熱如火頭目赫赤眼睛迸火大府祕小府赤六脈洪大有骨力此名熱病雖初得亦不汗蓋治傷寒之法惟初一二日與熱病使藥不同三四日以後與熱病同醫一日二日脈氣微小不疾不數不浮不散唯沉軟而細則汗之之藥宜極以溫辛如脾胃濡沉則是感冷之一候多變成陰證陽毒傷寒面赤頭痛身熱如火心神煩躁頭目昏眩項背強直脈候當洪大而有骨力傷寒煩躁飲水不休若脈實而洪不是疾數是為涎毒若洪大而不實是為心脾受毒傷寒後寒熱已退腹中餘一塊疼痛不可忍忽走在腿面上疼此為遺氣在肝脈氣洪而長肝脈循循而過左足宜清其血四五日熱毒上衝心胸噎塞滿悶渾身壯熱頭痛不止大府不通胸中痰實脈氣當寸關脈實而尺澤輕如絶心脈炎炎而上熱毒在肝善怒筋脈碎痛神昏不欲見人兩脅脹滿手足躁不安臥右手關脈當偏大緊急而長熱毒在心頭疼煩躁面赤舌強口語不快忽心痛善嘔狂言妄語忽思狂走入水精神不守左手脈一指偏大若舌強硬急以妙手針刺其舌兩傍出惡血不可刺其舌心熱毒在脾渾身肌肉碎疼聞食即惡思吐通身發熱兩唇乾焦邊脈動或環唇青黑色甚則腰痛腹滿兩頰痛右手關上脾脈一指偏大如衆脈熱毒在肺上衝咽喉心胸壅實隔塞不通渾身大熱面色或赤而又帶白喘咳不得大息右手寸口一指偏大而加之以浮熱毒在腎腰背疼痛脊膂強急頭不痛若渴數飲甚則項痛而強胻寒以酸足下不欲言其脈當左手尺澤微而輕浮又輕緊傷寒熱毒攻於肝心兩臟毒氣煩盛上衝於肺血隨氣逆鼻中衄血口中吐血甚則耳中眼中皆有血診其脈當洪大而炎上如流水之長如乍開乍合乍斂乍散此為失血之候熱毒內傷肝心兩臟肝心失守不能主血毒氣煩盛上蒸於肺血隨氣行流入於肌膚發為赤斑通身大熱頭重疼痛睡時如己身傍畔更有一身精神昏亂不守其脈雖大而鬱結不解重手取隱隱而有骨力如重夾綾絹裹之為發斑之候傷寒熱病發嗽坐臥喘急不安其脈右手寸關脈當洪大而加之浮數傷寒熱毒熾盛熏炙三焦攻擊皮膚通身發如橘色其脈如發斑候而差沉與黃疸同法熱病結胸心前閉塞胸中有一塊不通堅硬不散通身發熱頭疼不安面色黯赤喉中涎溢大府祕熱昏悶不省人事病則伏暑相似其肺當洪大而有骨力而肺脈實而不浮伏暑即結而沉傷寒熱病五六日愈加困重因吃疏藥下糞如紫黑色病勢不減神思昏昏小腹膨脹狂言妄語不省人事甚則腹中有塊堅硬不散其脈結伏此毒氣攻血腹內有淤積惡物十嘗九死陰毒傷寒渾身手足厥冷面青唇皮無色四肢無力心中寒栗重則閉目不知人事脈氣當細微而沉重手取之又軟而無骨力若腎脈細微而搏沉者為重診失血脈訣謂芤為失血芤脈狀如按環子內面兩頭有中間曲而缺非謂絶也若心脈肝脈帶芤而肺脈浮以數又肺脈微弦而緊則骨蒸咯血心脈芤而肺脈軟沉尺脈沉伏微微帶緊腸風下血心肺芤而尺脈緊膀胱滑小腸溺血肝脈芤而肺脈大浮而促兩手尺澤皆微喘而咯血肝心肺脈俱盛洪大而不甚有骨力乍開乍合如流水之狀此金火相傳當吐血心脈微而緊促而朝上魚際急按即來遲去速此為腸風下血少多心戰憚事無心力肝脈長而動下貫尺澤心脈大而實三焦血有餘亦當下血肝脈細微而澀尺澤微胃脈濡大府失血心脈與肝脈不盡連接如滴水起頭鼻衄出血肺脈浮大而散心脈大鼻暴衄訣云緊為蟲為痔須肝脈亦緊並細方為痔不爾即蟲也六脈浮大無骨力來疾去遲輕手帶洪重手取之如濡此久害瘡癤血少六脈浮大有骨力肝脈弦而長肺脈大而實沉與胃相際胃脈輕弦而濡此三焦血泛胃虛下血六脈如常心脈動腎脈搏而沉又細而數血泄或溺血便血婦人胎孕在手關寸脈滑數而肺脈脈虛而毛尺澤陷而與關脈不際者孕也若肝脈長而溢寸胎漏失血胎下血有二有肝氣虛微腎脈綿軟胎脈陷下胎動而失血者當補之若肝脈有餘而失血是胎溢當涼也婦人肝脈洪大而反結澀訣云澀脈生婦人敗血若脈洪大而又伏則積塊而血不行久則陰門腫以厥陰脈絡門而過診失精腎脈虛綿軟而沉又微以濡凡尺脈得八里脈又搏擊皆失精心脈動多夢交六脈濡緩而輕浮又澀多溺精六脈濡腎脈沉而細膀胱脈動而緩以大心脈動而浮主小便白濁肝心脈弦而腎脈緊而細重手按之卻來遲去疾小府當赤而濁腎脈細沉而微緊肺脈重而洪大小便即少腹先痛此寒伏於胞絡中赤脈弦而結陽中有伏陰胞滿小便不出小腹迸脹六脈如常人獨脾脈一指疾大而數唯腎脈差微主頭疼口乾溺精此為土邪入腎當清其脾婦人尺澤帶弱遲八里之脈膀胱脈動多下白帶若腎脈搏而沉陰中濕癢生瘡丈夫陰濕此皆精氣之失六脈皆澀又遲緩丈夫失精婦人敗血心脈肺脈疾而動腎脈膀胱動而濡丈夫溺多口乾若婦人産乳多口乾即多補其腎不可以口乾為熱診㿗疝㿗疝之病尺脈緊而動按之即虛肺脈輕弦而虛胃脈沉濡而軟尺脈綿軟寒厥入胃肺主少腹少腹當如有形腎虛即成㿗疝疾肝脈弦而疾腎脈綿軟而虛亦為以厥陰只陰器絡陰而過乃為㿗疝六脈急沉為疝為瘕為少腹痛蓋疝瘕皆寒搏於中而急則為痛腎脈大急沉為腎之疝當暖其腎肝脈大急沉為肝之疝當暖其肝心脈搏而沉又急而沉肺脈同診皆為疝若小急而不鼓皆為瘕診汗脈脈訣曰陰微盜汗勞兼有此特其一端耳大抵汗為血之餘若陰微則血不足則當主少汗此言微盜汗當綿軟而澀右手膀胱急而沉心脈搏而動方主盜汗小府澀忽失精六脈皆滑主汗以其陰氣有餘故多汗心脈大滑而腎脈搏沉以汗為心之液今心脈大滑則水犯之而動故汗心脈獨大而洪六脈疾而動主睡中忽然出汗以心氣獨主故耳六脈濡濕而重濁脾脈大而濕主汗出憎風論膈噎六脈微而澀腎脈綿軟而沉來遲去疾如代脈相似心脈沉主元陽正氣虛弱陽事不起小便餘瀝輕冒風雨忽吃些子冷物即胸中噎塞如有一塊物在喉中飲食無味肝心脈澀而遲來遲去速肝脈無骨力主思慮喜怒忽憂淤思憶其狀心胸滿悶隔塞不快飲食難下兩脅脹滿忽時氣痛衝心不可忍面色青黃肝心脈澀而沉重手取之緩而無力如新沐舉重來遲去疾胸中噎塞飲食減少行步無力大府虛冷非時間心前如有一條冷線上徹咽喉此為冷噎六脈澀而浮汗肝心脈浮大而無力胃脈大而散重手取之雖無骨力隱隱而來唯兩手尺澤差短其胸前隔塞飲食減少大府祕熱忽時不調吃咸即心躁吃暖即喉干痰實頭目昏暈兩足無力載身不起舌上生瘡唇皮焦裂或非時口中涎流沖肺散為干嗽忽時急飢見食即吐食不住腹此熱膈六脈微有骨力而來遲卻差小而微急主寒熱氣膈其狀大府熱忽時卻下黃糞汁胸中鬲塞不快滯氣積聚六脈浮大輕有骨力來遲去速肺脈偏大而浮加之泛如促聚於寸口主熱噎胸前噎塞不通飲食不下所吃湯水只到喉仍便吐出所咽下津液只到喉中亦便吐出口膠非時睡涎溢大府祕熱當用通藥利其大府熱咽如上所説用引大府藥既通其大府即脈氣洪大如實但去疾與尋常洪大之脈不同即輕以解肺順氣益胃化涎藥餌之六脈皆得噎脈肝脈偏大而澀肺脈橫格主因怒而得大便不通六脈皆噎脈肝心微小而弦微有骨力而來遲因悲憂而得所吃物聞巡歷胸間隱隱而下蓋風不化血不盛當益其肝心順其氣六脈濡伏重手取之如動而無骨力主冷噎飲食不進身上厥冷胸中如有冷物填塞六脈濡伏胃脈偏重濁而重主胃寒履濕而得噎四肢厥冷胸前噎塞飲食不下診室女婦人諸脈諸婦人之脈陰陽與男子相反當要尺澤隱隱來去如一和緩不澀不弦寸口平方能孕育若尺澤弦急肝脈動心脈疾六脈澀而不與勻無子血盛氣衰為孕謂心脈洪大流利替替而滑肺脈毛而微卻不浮為孕仍須尺澤與肝脈微間而肝脈微橫即是孕肝脈澀而不絶尺脈微陷心脈滑是孕肝脈澀心脈滑肺脈衰一如孕脈然尺脈急而長為敗血為積血非孕肺脈急而弦長右脈浮而短小腹堅硬如孕肺脈急而沉腎脈濡沉小腹有形如孕肝脈急而沉腎脈小急緊陰癢陰中痛腫室女六脈皆弦而長又洪尺脈微緊經候通行兩足痛腫行不得肌肉消瘦大府幹澀頭痛眼昏室女十六七肝脈弦而長胃脈輕弦表裡如一骨槽蒸熱風行周身上焦壅肌肉消瘦忽通身黃黑面色帶黑小便黃赤五心煩躁漸欲成勞婦人肺脈盛肝脈軟而虛忽微而動心脈芤肺氣有餘相刑剋肝木受金傷不能主血月候多少遲速不定多不節以致無子偶然懷之又無故墜下當減其肺益其肝關尺微細而沉腎氣虧乏不能生肝經候多少遲速不定不能生子肝心脈弦緊而疾肺脈浮而大尺澤鬱郁不散月經不通大府祕熱兩足痛不得行肌肉消瘦漸次如馬籃節六脈弦緊而長心脈洪大而實尺脈結月經不通長淤怒不得安處忽忽似顛狂夜不得睡小便赤大府如常忽下鴨溏肝脈虛弦而長按之無骨力心脈動而疾肝邪傳心日夜煩躁忽如顛狂不得眠睡六脈大而沉肝脈橫肺脈浮主婦人血熱經候行少背上非時有一片發熱口無津液忽兩三月一次忽半年不行或止些小黑血六脈大而沉重手取之隱隱乃得輕手如無重取卻有骨力非如尋常沉伏之脈此因胎藏本熱忽因産後未經百日恣吃涼物寒熱相伏經及二三年月候不通全如懷孕惡血所聚如有身露下有塊但堅硬不動往往卻氣氣痛只以辛溫藥散自然行下不必疏通婦人脈如孕尺脈亦絶與孕無殊但六脈動而不勻胃脈輕帶伏此因經候行次或産後起早並誤吃生冷傷損氣血俱病因生積聚久無所療變成惡物其狀腹中成塊如蛇鼠如鹿如虎之類以手按之沖手跳起但此病到年深其惡物帶命吃人血盡忽絶無經候通行或經候行時只如淡水如此即傾危人也六脈疾大虛急疾大為風浮血溢急為尺澤有寒忽因經候行時忽因産後吃生冷不相當之物忽産後早起傷風血氣俱病臨經行時忽先氣疼忽小腹急疼心脈芤肝脈虛尺澤微細血海虛損經候過多忽成片流下不可禁止六脈皆沉肝脈弱而虛尺澤細細如縷又帶澀而遲肝腎多感寒伏在子宮血海虛損經候過多小便白濁如米泔少陰腎脈貫脊而行背上忽有片寒冷口中即吐清水六脈疾大而浮腎脈急而浮心脈差洪血風頭痛口乾吐痰六脈弦大肝心脈澀而短尺脈急沉而搏緣使性多瘀怒傷損肝心正氣因而積涎怒而氣逆涎隨氣上其狀聞得心前昏悶潰亂不快遂有一塊之物上觸到咽喉即手足俱冷口噤不開不省人事六脈弦大而疾尺脈亦弦而動泛泛不絶經候過多七八月不止皆下鮮血此非虛不可補止可涼風血緣風盛血散然久而不止即肝氣脫血妊娠之脈若肺雖微然浮而聚於寸口當上氣喘促妊娠六脈雖要滑而流利然肝脈滑而洪大胃脈亦有骨力則上喘而口膠見食多妊娠之脈尺脈不絶與肝脈相連而軟無力又沉以細當主少腹疼痛蓋胎氣熱則在上冷則墜下妊娠之脈尺脈急沉而搏胃脈濡而重六脈又軟胎氣墜下陰門腫妊娠六脈疾而動肝脈如長而散主胎漏失血不可補之此血溢也當安其胎涼其血妊娠尺澤沉伏肺脈實沉而動腰痛不可舉兩手沉重行步無力睡腸痛妊娠心脈洪大而浮肺脈浮而散胃脈浮而大通身瘙癢漸次面目渾身俱腫心躁不安妊娠六脈皆結而伏胃脈沉而動主忽然如中風心前昏悶即如有一塊物填塞此緣臟腑本熱而忽感寒忽吃生冷寒熱相伏而不散以辛溫散之妊娠六脈洪大過關溢寸主上鬲有熱唇口乾焦口舌生瘡非時頭痛不安小便黃赤妊娠血有餘六脈大而疾又緊而流利表裡俱有骨力主渾身碎痛並腹內疼不可忍者宜涼其血婦人妊娠有發熱如瘧雖夏常畏風此肝盛血熱風行於表熱極即生寒若肝盛胃虛即更右一壁寒以妊則血盛而氣衰故也診其脈當左長而緊微帶浮右關沉而濡如按泥漿婦人之脈六脈俱沉細而急左手尺澤微而緊指指如縷而轉連及肝脈按之即結而散此胞精不足當久患敗血赤白帶若動而數加之以短即不久傾危婦人之脈皆沉而洪大重手取之其深至骨隱隱然應指有骨力來疾去遲至數與常人無異但胃脈亦洪大上隔有伏涎此為血澀生積當經候不快忽不行腰痹口乾而渴背迸眼睛迸兩臂重手缺盆迸大府祕心憎夜不得眠診黃疸黃疸有二有肝熱刑脾而疸有濕極而疸若肝脈洪大胃脈濡弱而濁肝脈加之浮腎脈搏而擊即發黃疸若胃脈重濁而弦長按之無骨力腎脈搏而沉心脈有動象即濕極而發疸然疸之病多先目黃以衆脈皆會於目系所以肝熱亦目黃而疸胃熱亦目黃而疸肝熱即口乾引飲小府赤而澀胃濕亦目黃而口不幹小府赤而不澀又有下部冒寒履濕濕氣衝心發為目黃不必是疸素問言太陽之勝有面赤目黃者是也只可緩行其小府濕熱相鬱而疸即脈洪而大不弦卻帶軟而長宜利其小府半産正産論夫半産正産婦人之常事也然其間多有産後染成大病忽絶無月水行忽宮藏虧損不禁忽積成癥瘕而歲久月深傾損性命此無他輕之以為半産而不甚將養之所致也不知半産之候其將養當過如正産十倍正産止血藏空虛半産即肌骨腐爛常切譬之正産有如果中之栗夫栗之為物俟其自熟陰陽氣足則其殼自開而栗子自墮方是之時子之與殼兩無所損如婦人懷孕十月已滿陰陽氣足則其子宮自開而兒子生下若月未滿足因誤服藥餌忽寒邪熱毒所傷忽扶輕舉重忽倒地打傷其胎藏傷損胞系腐爛然後其胎墜下即有如世人採折新栗碎其皮殼就殼中斷其根蒂然後取得栗子此其半産之喻也以其胎藏傷損胞系斷去而後胎墜下則其半産之人將養調治得不過如正産十倍者哉正産之後補其虛生其好血化其惡血保其藏氣去其風邪人人無有不安也半産之後補其虛生其肌肉益血窮其所因解其病去其風邪養其藏氣加之將養過如正産十倍損傷之胎無不平復也籲世之人多輕之至於傾危不可勝數得不惜哉正産半産出血過多不可禁止忽氣悶不識人其脈洪大而浮以泛如新沐如破肚之脈若微細而澀絶其候凶胎死腹中其脈洪大而沉尺澤當溢透下部不澀不絶即無畏謂胎不下當氣滿實所以洪大而沉又溢寸過若澀而短即死婦人欲産漿破血下渾身疼診其脈當洪大而有骨力尺澤透而長方是正産謂孕則尺脈不來欲産而漿下則尺澤透若渾身疼甚而漿未破血不肯下即難産凡渾身痛甚須是腰痛連穀道疼迸痛方是正候以少陰犯胞絡脈連腰過脊及肛門若只是腹痛不可用作正産候産後脈結而澀尺脈短而動肺脈浮而急即是衣未下産後血風虛熱搏之洪大而數數與疾不同數則兼動與短主血暈面色深赤身體如醉見屋宇如懸倒忽頭痛重不安産後血風虛熱搏之洪大而疾心脈實而有骨力肺脈洪而浮主血逆頭痛面赤如醉身體如在虛空大腑祕澀語聲微細産後六脈得洪大如血暈脈胃脈實而弦肺脈浮而洪主大腑祕熱頭痛面赤噁心嘔逆産後如骨蒸脈六脈弦而微緊有骨力主血行少未經數日身下乾淨腹中余血惡血未下非時氣痛攻心刺肋産後六脈輕浮微有骨力而來遲肝脈細而虛弦多因小遺登後早忽亂吃食物早宮藏傷風飲食減可近以十日遠經半月粥食不進才吃一口湯水即聞湯水巡歷胸中方下入胃既入胃仍下出面色並肉色黃形體困重此候留風邪在中血熱而感寒成寒熱隔氣風不用事食不化此病須是吃得酒一兩盞方可調理每日宜服酒一兩盞如治風咽調理故豫特製此方細辛官桂芎當歸各半兩羌活藿香各一分木香一銖桑寄生分吳茱萸蓬莪朮各三銖甘草四銖炙上為細末每服三錢空心煎防風湯調下吃了渾身手足暖忽頭疼即連吃酒一兩盞候通身發熱忽行下惡物即便安樂也若人得此病須是依上件題目方可服此方産後六脈皆沉伏而遲主渾身厥冷非時噤不識人産後六脈動而疾胃脈滑而溢於尺澤腎脈軟而虛弦此緣産遲忽衣遲既産後早起傷風吐泄不定之脈宜溫其胃産後六脈沉細而伏此寒氣在下腰痛起動不得産後六脈沉細腎脈伏而沉肺脈虛而大産後乳汁多故流出其乳汁冷而口乾此腎冷肺虛寒不可以口乾為上熱誤服涼藥此腎少陰之脈從肺出絡心注胸中其直行者從腎上貫肝鬲入肺中循喉嚨夾舌本故如此産後六脈洪大而結肝脈澀肺脈浮忽然乳疼堅硬成塊將欲成癰腫産後未經百日腹疼氣疼轉瀉不止六脈沉細而虛此余寒在中産後心脈一指偏小而動又芤陷若肺脈重而洪大卻無骨力則主乳多肺脈如常惟心脈如此加之腎脈微細則小便虛憊産後惡血行少腹中塊刺痛須六脈大而緊肺脈緊而虛弦為寒肺主少腹中有塊産後血熱肝臟風搏生涎發為疼痛即急心痛六脈當得二陽一陰二陽實大一陰者沉也産後尺澤虛軟而代至數不及白涕不止血崩下帶産後尺澤虛軟而代至數不及加之胃脈濡濕而散即水土俱寒多下白涕産後六脈浮而虛腎脈微而小至數遲來處無力綿綿若代中風肌肉麻痹肢節牽抽非時增寒大府虛冷産後六脈浮而數來疾而去遲中風四肢躁身體疼精神昏悶大府祕澀産後亂吃物早傷損脾氣非時腹脅脹滿飲食不快診其脈胃脈遲而肝脈弱産後亂吃物早傷損血氣身體虛弱飲食減少眼如貓兒眼診其脈肺脈橫格而肝脈芤傷微弱腎脈泛泛欲動而無力此血氣俱病當調其血益其氣暖其胃使進食産後腎脈微而沉胃脈濡濕而沉多緣寒氣所損忽因坐草多時地之寒氣所損忽因坐草多時地之寒氣所沖腹中成塊忽衝心背臍腹疼痛嘔逆噁心不思飲食産後血氣微弱六脈沉細重手取之細細乃得脈氣別無陽脈唯肺脈差浮而弱主頭冷重項頸蕤非時間頭面上肌肉麻痹大腸虛冷頻出後又多虛往或時泄瀉兩足沉重少精神行步無力面黃瘦或未經百日經候通行或誤吃涼藥有此疾候忽自懷孕時間通身寒冷至産後卻有此疾但極以補腎補肝藥補益其血氣而祛風邪藥助之産後心虛中風心中戰栗驚動不安如人將捕大府傷冷六脈微而肝心脈偏細沉又産後只緣腎氣之虛寒風邪所中腎脈細而搏以沉腎既受病傳其所勝心感腎邪非時驚悸如人將捕初以益心氣去風邪藥治之次當補其腎又次當益其肝足其血緣心受腎邪而又肝氣微弱不能生其心氣故以三方藥治之産後肝腎虛冷受邪六脈虛微腎脈搏沉心脈輕帶滑主産後肝虛中風産後血暈之疾有二風搏血熱而暈即六脈洪大有骨力又有一般大府虛冷卻因使性激怒傷損肝心其氣上逆因而血暈其狀頭覺重痛昏昏如醉語聲低小但多思睡診其候六脈輕有骨力不至洪大肺脈輕浮而不毛心脈促而朝上此最為用藥之難故作此一方麻黃去根一分延胡索芎防風各一分官桂去皮半兩甘草炙細辛各二銖羌活木香各一銖上為細末每服一錢半水一盞煎取九分非時去滓服不要多服病止即住藥若氣體虛微吃煎藥未效卻加壯熱頭痛面赤如醉宜服此方牡丹皮荊芥穗羌活麻黃去根防風各一分甘草二銖炙上為細末每服二錢水八分一盞煎一兩沸急瀉出食後徐徐去滓熱服病已即止産後余惡血未下因感風邪與熱血相搏壯熱頭痛面赤如醉人眼澀𧌴急昏悶不醒身如在虛空見食即吐食不住腹脈氣結而不勻逐位間絶然各有骨力而微此用藥亦難宜此方麻黃去根三錢麥門冬黃芩羌活大黃荊芥穗山梔子芍藥射干各半兩官桂當歸各一分甘草炙三銖上為細末不要𭵶只生搗每服二錢濃煎薄荷湯調下若脈氣極有骨力應指而動又當有伏涎當大府祕熱出後不通前藥二錢半取汁用調下牽牛末一錢半夏末一字和滓服大府不熱不用牽牛載之治病用藥初不求異炮炙制度自依本法以銖計者蓋其審證精切不過三四服立愈逾是而不效乃察病按方之不審便當改轍不可泥也此皆親試而得之非敢誇大其説六銖為分四分為兩
